<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>挙手チャレンジ ― 幽霊の窓</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #04000a;
  color: #e0e0f0;
  overflow: hidden;
  height: 100vh;
  animation: flicker 9s infinite;
}
@keyframes flicker {
  0%,91%,95%,100% { opacity: 1; }
  92%  { opacity: .45; }
  93%  { opacity: 1; }
  94%  { opacity: .65; }
}

/* ===== 幽霊画像（背面透過・徐々に近づく） ===== */
#ghost-approaching {
  position: fixed;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0.05);
  width: 100vw; height: 100vh;
  object-fit: cover;
  object-position: center center;
  mix-blend-mode: screen;
  opacity: 0;
  pointer-events: none;
  z-index: 0;
  filter: brightness(1.05) contrast(1.1);
}

/* ===== 雨 ===== */
.rain { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.rain-drop {
  position: absolute; top: -100px; width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(130,160,255,.22));
  animation: rainFall linear infinite;
}
@keyframes rainFall { to { transform: translateY(115vh); } }

/* ===== 窓SVG（画面いっぱい） ===== */
#window-svg {
  position: fixed; inset: 0;
  width: 100vw; height: 100vh;
  z-index: 2;
  pointer-events: none;
}

/* ===== 上部UI ===== */
#top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 12px 16px 20px;
  background: linear-gradient(to bottom, rgba(4,0,10,.88) 55%, transparent 100%);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.back-btn {
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.16);
  color: rgba(255,255,255,.65); padding: 6px 14px; border-radius: 20px;
  font-size: .78rem; font-weight: 700; text-decoration: none;
  white-space: nowrap; flex-shrink: 0;
}
.back-btn:hover { background: rgba(255,255,255,.14); }
#hd-title {
  font-size: clamp(1rem, 4vw, 1.6rem); font-weight: 900; color: #cc2222;
  text-shadow: 0 0 20px rgba(200,20,20,.8);
  letter-spacing: .06em; text-align: center; flex: 1;
}
#bloom-label {
  font-size: .70rem; font-weight: 800;
  color: rgba(255,70,70,.75); white-space: nowrap;
  flex-shrink: 0; padding-top: 7px;
}

/* ===== 下部UI ===== */
/* ===== 下部スリムバー（常時表示） ===== */
#bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 11;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px 10px;
  background: linear-gradient(to top, rgba(4,0,10,.92) 0%, transparent 100%);
  pointer-events: none;
}
#window-foot {
  font-size: .80rem; font-weight: 800;
  color: rgba(200,40,40,.9); letter-spacing: .04em;
  text-shadow: 0 0 10px rgba(200,40,40,.5);
  pointer-events: none;
}
#ui-toggle-btn {
  pointer-events: auto;
  background: rgba(100,0,0,.75); border: 1px solid rgba(180,30,30,.5);
  color: #fff; padding: 7px 16px; border-radius: 20px;
  font-size: .80rem; font-weight: 700; cursor: pointer;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
#ui-toggle-btn:hover { background: rgba(140,0,0,.85); }

/* ===== 操作パネル（折りたたみ） ===== */
#bottom-ui {
  position: fixed; bottom: 0; left: 50%; z-index: 10;
  width: 100%; max-width: 560px;
  background: rgba(4,0,10,.96); backdrop-filter: blur(14px);
  border-top: 1px solid rgba(120,20,20,.4);
  border-radius: 18px 18px 0 0;
  padding: 14px 14px 16px;
  transform: translateX(-50%) translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
#bottom-ui.open { transform: translateX(-50%) translateY(0); }

/* ===== ステータス ===== */
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.stat {
  background: rgba(10,2,2,.82); backdrop-filter: blur(10px);
  border-radius: 12px; padding: 8px 6px; text-align: center;
  box-shadow: 0 2px 10px rgba(0,0,0,.5); border: 1px solid rgba(100,20,20,.3);
}
.stat .lbl { font-size: .60rem; color: rgba(255,70,70,.7); font-weight: 700; margin-bottom: 2px; }
.stat .val { font-size: 1.3rem; font-weight: 900; color: #ff5555; line-height: 1; }
.stat .unt { font-size: .60rem; color: rgba(255,70,70,.4); }

/* ===== ポイント追加パネル ===== */
.pt-panel {
  background: rgba(10,2,2,.85); backdrop-filter: blur(12px);
  border-radius: 16px; padding: 13px 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,.6); border: 1px solid rgba(100,20,20,.3);
}
.pt-title { font-size: .86rem; font-weight: 800; color: rgba(255,70,70,.9); margin-bottom: 10px; }
.pin-row  { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.pin-f {
  padding: 8px 12px; border: 2px solid rgba(180,40,40,.35); border-radius: 10px;
  font-size: 1rem; text-align: center; letter-spacing: .2em; width: 120px;
  font-family: inherit; outline: none; background: rgba(0,0,0,.5); color: #ff8080;
  transition: border-color .2s;
}
.pin-f:focus { border-color: rgba(180,40,40,.8); }
.btn-auth {
  padding: 8px 16px; background: linear-gradient(135deg, #7a0000, #bb1c1c);
  color: #fff; border: none; border-radius: 10px;
  font-size: .86rem; font-weight: 700; cursor: pointer;
}
.btn-auth:hover { opacity: .88; }
.pin-ng { color: #ff5555; font-size: .82rem; }
.pt-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.pt-input {
  padding: 9px 12px; border: 2px solid rgba(180,40,40,.35); border-radius: 10px;
  font-size: 1.1rem; font-weight: 700; text-align: center; width: 85px;
  outline: none; font-family: inherit; color: #ff8080; background: rgba(0,0,0,.5);
}
.pt-input:focus { border-color: rgba(180,40,40,.8); }
.btn-add-pt {
  padding: 9px 20px; background: linear-gradient(135deg, #7a0000, #bb1c1c);
  color: #fff; border: none; border-radius: 10px;
  font-size: .92rem; font-weight: 800; cursor: pointer;
  box-shadow: 0 3px 14px rgba(120,0,0,.45); transition: opacity .15s, transform .1s;
}
.btn-add-pt:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
.btn-add-pt:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
.pt-hint { font-size: .72rem; color: rgba(255,70,70,.45); margin-top: 6px; }
#push-status { font-size: .78rem; text-align: center; margin-top: 6px; min-height: 1.2em; }

/* ===== ゴール：扉演出 ===== */
#goal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: #000;
}
#goal-overlay.show { display: block; }

/* 幽霊（画面いっぱい） */
#ghost-behind {
  position: absolute; inset: 0;
  background: #000; overflow: hidden;
}
#ghost-behind::after {
  content: '';
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse 65% 65% at 52% 50%, rgba(160,0,0,.28) 0%, transparent 70%);
  animation: ghostPulse 2s ease-in-out infinite;
}
@keyframes ghostPulse {
  0%,100% { opacity: .5; }
  50%     { opacity: 1; }
}
#ghost-img {
  width: 100vw; height: 100vh;
  object-fit: cover;
  object-position: center center;
  filter: brightness(.95) contrast(1.1);
  position: relative; z-index: 0;
  opacity: 0; transition: opacity 1.4s ease .3s;
}
#goal-overlay.door-open #ghost-img { opacity: 1; }

/* 扉 */
.door-half {
  position: absolute; top: 0; bottom: 0; width: 50.5%;
  background:
    repeating-linear-gradient(90deg,
      rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px,
      transparent 1px, transparent 22px),
    repeating-linear-gradient(180deg,
      rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px,
      transparent 1px, transparent 60px),
    linear-gradient(160deg, #2c1200 0%, #190900 45%, #0d0400 100%);
  box-shadow: inset 0 0 30px rgba(0,0,0,.6);
  transition: transform 1.6s cubic-bezier(.4,0,.1,1);
  z-index: 2;
}
#door-left  { left: 0;  border-right: 4px solid #0a0300; }
#door-right { right: 0; border-left:  4px solid #0a0300; }
#door-left::after, #door-right::before {
  content: '';
  position: absolute; top: 50%; width: 10px; height: 44px;
  background: linear-gradient(135deg, #7a5020, #3a2010);
  border-radius: 5px; transform: translateY(-50%);
}
#door-left::after  { right: 14px; }
#door-right::before { left: 14px; }
#goal-overlay.door-open #door-left  { transform: translateX(-100%); }
#goal-overlay.door-open #door-right { transform: translateX(100%); }

/* テキスト */
#goal-text-box {
  position: absolute; bottom: 6vh; left: 0; right: 0;
  text-align: center; z-index: 3;
  opacity: 0; transform: translateY(18px);
  transition: opacity .8s ease, transform .8s ease;
  pointer-events: none;
}
#goal-overlay.text-show #goal-text-box {
  opacity: 1; transform: translateY(0); pointer-events: auto;
}
.goal-ttl {
  font-size: clamp(1.5rem,5vw,2.4rem); font-weight: 900; color: #dd1111;
  text-shadow: 0 0 28px rgba(220,0,0,.9), 0 0 8px rgba(220,0,0,.5);
  letter-spacing: .06em; margin-bottom: 8px;
}
.goal-msg { font-size: .95rem; color: rgba(255,190,190,.88); line-height: 1.7; }
.goal-cls {
  margin-top: 18px; padding: 12px 36px;
  background: linear-gradient(135deg, #7a0000, #bb1c1c);
  color: #fff; border: none; border-radius: 14px;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 20px rgba(120,0,0,.5);
}
.goal-cls:hover { opacity: .88; }

/* 画面揺れ */
@keyframes screenShake {
  0%,100% { transform: translate(0,0); }
  10% { transform: translate(-7px,-5px); }
  20% { transform: translate(8px,4px); }
  30% { transform: translate(-6px,6px); }
  40% { transform: translate(6px,-5px); }
  50% { transform: translate(-5px,5px); }
  60% { transform: translate(7px,-4px); }
  70% { transform: translate(-6px,4px); }
  80% { transform: translate(5px,-6px); }
  90% { transform: translate(-4px,5px); }
}

/* ===== 手形アニメーション ===== */
@keyframes handSlam {
  0%   { opacity: 0; }
  40%  { opacity: .9; }
  100% { opacity: 1; }
}
.handprint-new { animation: handSlam .5s ease-out forwards; }
</style>
</head>
<body>

<!-- 幽霊（背面透過・徐々に近づく） -->
<img id="ghost-approaching" src="ghost_final.PNG" alt="">

<!-- 雨 -->
<div class="rain" id="rain"></div>

<!-- ゴールオーバーレイ -->
<div id="goal-overlay">
  <div id="ghost-behind">
    <img id="ghost-img" src="ghost_final.PNG" alt="">
  </div>
  <div class="door-half" id="door-left"></div>
  <div class="door-half" id="door-right"></div>
  <div id="goal-text-box">
    <div class="goal-ttl">👻 来てしまった…！！！</div>
    <div class="goal-msg">みんなの挙手が幽霊を呼んでしまった…！<br>💀 1000回の挙手、達成！！ 💀</div>
    <button class="goal-cls" onclick="closeGoal()">😱 とじる</button>
  </div>
</div>

<!-- 窓SVG（画面いっぱい） -->
<svg id="window-svg" viewBox="0 0 320 270" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glassGrad" cx="38%" cy="32%" r="72%">
      <stop offset="0%"   stop-color="#1a2438" stop-opacity=".30"/>
      <stop offset="100%" stop-color="#04060e" stop-opacity=".50"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d8d870"/>
      <stop offset="100%" stop-color="#a0a040"/>
    </radialGradient>
    <!-- 手形フィルター -->
    <filter id="hand-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="soft"/>
      <feMerge>
        <feMergeNode in="soft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="glass-clip">
      <rect x="0" y="0" width="320" height="270"/>
    </clipPath>
  </defs>

  <!-- 夜の空 -->
  <rect x="0" y="0" width="320" height="270" fill="#030410"/>
  <!-- 月 -->
  <circle cx="275" cy="40" r="22" fill="url(#moonGrad)" opacity=".45"/>
  <circle cx="284" cy="35" r="18" fill="#030410"/>
  <!-- 星 -->
  <circle cx="40"  cy="30"  r="1.2" fill="#fff" opacity=".5"/>
  <circle cx="80"  cy="18"  r="1"   fill="#fff" opacity=".4"/>
  <circle cx="200" cy="22"  r="1.5" fill="#fff" opacity=".6"/>
  <circle cx="60"  cy="200" r="1.2" fill="#fff" opacity=".35"/>
  <circle cx="130" cy="12"  r="1.2" fill="#fff" opacity=".5"/>
  <circle cx="290" cy="90"  r="1"   fill="#fff" opacity=".3"/>

  <!-- ガラス面（半透明：幽霊が透けて見える） -->
  <rect x="0" y="0" width="320" height="270" fill="url(#glassGrad)"/>

  <!-- ガラスの反射 -->
  <line x1="20" y1="0" x2="50"  y2="270" stroke="rgba(255,255,255,.016)" stroke-width="18" clip-path="url(#glass-clip)"/>
  <line x1="70" y1="0" x2="95"  y2="270" stroke="rgba(255,255,255,.010)" stroke-width="10" clip-path="url(#glass-clip)"/>

  <!-- 雨粒（ガラス面） -->
  <g id="rain-drops" clip-path="url(#glass-clip)" opacity=".38"></g>

  <!-- 手形グループ -->
  <g id="handprints-group" clip-path="url(#glass-clip)"></g>

  <!-- 窓桟 -->
  <rect x="155" y="0"   width="10" height="270" fill="rgba(12,5,0,.55)"/>
  <rect x="0"   y="128" width="320" height="10"  fill="rgba(12,5,0,.55)"/>
  <rect x="157" y="0"   width="2"  height="270"  fill="rgba(35,15,0,.35)"/>
  <rect x="0"   y="130" width="320" height="2"    fill="rgba(35,15,0,.35)"/>

  <!-- 窓枠（縁） -->
  <rect x="0" y="0" width="320" height="270" fill="none" stroke="rgba(18,7,0,.85)" stroke-width="14"/>
</svg>

<!-- 上部UI -->
<div id="top-bar">
  <a href="class_homepage.html" class="back-btn">← ホームへ</a>
  <div id="hd-title">挙手チャレンジ</div>
  <div id="bloom-label">🖐 手形：0個</div>
</div>

<!-- 下部スリムバー（常時表示） -->
<div id="bottom-bar">
  <div id="window-foot">窓の向こうに何かいる…？ 👀</div>
  <button id="ui-toggle-btn" onclick="toggleUI()">🔑 操作 ▲</button>
</div>

<!-- 操作パネル（折りたたみ） -->
<div id="bottom-ui">
  <div class="stats" id="stats"></div>
  <div class="pt-panel" id="pt-panel">
    <div class="pt-title">🔑 挙手ポイント追加（教員専用）</div>
    <div class="pin-row" id="pin-row">
      <input type="password" class="pin-f" id="pin-f" placeholder="暗証番号" maxlength="8"
             onkeydown="if(event.key==='Enter')authPin()">
      <button class="btn-auth" onclick="authPin()">認証する</button>
      <span id="pin-msg"></span>
    </div>
    <div id="pt-add-area" style="display:none">
      <div class="pt-row">
        <input type="number" class="pt-input" id="pt-val" min="1" max="999" value="1">
        <span style="font-size:.86rem;font-weight:700;color:rgba(255,70,70,.8)">回分</span>
        <button class="btn-add-pt" id="btn-add-pt" onclick="handleAdd()">👻 追加する</button>
      </div>
      <div class="pt-hint">※ 挙手1回 = 幽霊が1歩近づきます</div>
    </div>
    <div id="push-status"></div>
  </div>
</div>

<script>
/* ============================================================
   定数
   ============================================================ */
const TEACHER_PIN = '1210';
const HOP_MS      = 15;
const SVG_NS      = 'http://www.w3.org/2000/svg';

/* ============================================================
   手形の位置（45箇所）ガラス中心(160,135)基準
   ============================================================ */
const HANDPRINT_POS = [
  // ── 最初：中心寄り・大きめ ──
  { x:  0,  y:  5,  rot: 10,  sz: 1.00, h: 0 },
  { x: 48,  y: 22,  rot:-18,  sz: 0.88, h: 1 },
  { x:-42,  y:-10,  rot: 26,  sz: 0.92, h: 0 },
  { x: 78,  y:-26,  rot: -6,  sz: 0.82, h: 1 },
  { x:-78,  y: 18,  rot: 22,  sz: 0.88, h: 0 },
  { x: 24,  y:-48,  rot:-22,  sz: 0.78, h: 1 },
  { x:-56,  y:-52,  rot: 18,  sz: 0.82, h: 0 },
  { x: 34,  y: 52,  rot:-28,  sz: 0.82, h: 1 },
  { x:-66,  y: 56,  rot: 12,  sz: 0.88, h: 0 },
  { x: 20,  y:-38,  rot:-20,  sz: 0.78, h: 1 },
  // ── 中盤：外側へ ──
  { x: 90,  y:-50,  rot:-12,  sz: 0.72, h: 1 },
  { x:-24,  y:-60,  rot: 32,  sz: 0.68, h: 0 },
  { x:108,  y:-16,  rot:  8,  sz: 0.76, h: 1 },
  { x: 96,  y: 48,  rot:-16,  sz: 0.72, h: 0 },
  { x:-96,  y: 50,  rot: 22,  sz: 0.78, h: 1 },
  { x: 14,  y: 68,  rot:  6,  sz: 0.68, h: 0 },
  { x:-30,  y: 38,  rot:-10,  sz: 0.72, h: 1 },
  { x: 76,  y: -8,  rot: 20,  sz: 0.68, h: 0 },
  { x:-76,  y: -8,  rot:-20,  sz: 0.68, h: 1 },
  { x: 42,  y: 82,  rot:-12,  sz: 0.65, h: 0 },
  // ── 後半：隙間を埋める ──
  { x:-114, y:-26,  rot: 38,  sz: 0.66, h: 0 },
  { x: 114, y: 14,  rot:-22,  sz: 0.62, h: 1 },
  { x: 54,  y:-70,  rot: 12,  sz: 0.62, h: 0 },
  { x:-84,  y:-62,  rot:-18,  sz: 0.58, h: 1 },
  { x:100,  y:-62,  rot: 28,  sz: 0.58, h: 0 },
  { x: 64,  y: 70,  rot: 18,  sz: 0.62, h: 1 },
  { x:-108, y:  8,  rot: 32,  sz: 0.66, h: 0 },
  { x:-50,  y: 64,  rot: 25,  sz: 0.58, h: 1 },
  { x:-38,  y: 78,  rot: 20,  sz: 0.65, h: 0 },
  { x: 55,  y:-58,  rot:-24,  sz: 0.70, h: 1 },
  // ── 終盤：端まで埋め尽くす ──
  { x:-68,  y:-78,  rot: 30,  sz: 0.64, h: 0 },
  { x: 88,  y:-78,  rot:-10,  sz: 0.62, h: 1 },
  { x: 72,  y: 45,  rot:-30,  sz: 0.66, h: 0 },
  { x:-92,  y:-44,  rot: 28,  sz: 0.60, h: 1 },
  { x: 118, y:-34,  rot:-18,  sz: 0.58, h: 0 },
  { x:-118, y: 30,  rot: 35,  sz: 0.58, h: 1 },
  { x: 102, y: 68,  rot:-25,  sz: 0.55, h: 0 },
  { x:-100, y: 70,  rot: 18,  sz: 0.56, h: 1 },
  { x: 28,  y:-88,  rot:  8,  sz: 0.60, h: 0 },
  { x:-62,  y: 36,  rot:-15,  sz: 0.62, h: 1 },
  { x: 18,  y: 92,  rot: -5,  sz: 0.56, h: 0 },
  { x:-18,  y:-92,  rot: 15,  sz: 0.58, h: 1 },
  { x: 120, y: 42,  rot:-35,  sz: 0.54, h: 0 },
  { x:-120, y:-50,  rot: 40,  sz: 0.54, h: 1 },
  { x:-30,  y:-80,  rot: 15,  sz: 0.60, h: 0 },
];

/* ============================================================
   状態
   ============================================================ */
let ci           = 0;
let curPos       = 0;
let totalCells   = 1000;
let campName     = '挙手チャレンジ';
let isAuth       = false;
let isAnim       = false;
let isGoal       = false;
let _cachedData  = null;
let handprintEls = [];

/* ============================================================
   データ
   ============================================================ */
async function loadData() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) return;
    const d = await res.json();
    _cachedData = d;
    if (d.campaigns && d.campaigns[ci]) {
      const c  = d.campaigns[ci];
      curPos     = c.current   ?? 0;
      totalCells = c.total     ?? 1000;
      campName   = c.name      || '挙手チャレンジ';
      isGoal     = c.completed || curPos >= totalCells;
    }
  } catch(e) { console.error(e); }
}

async function savePos() {
  try {
    let d = _cachedData;
    if (!d) { const res = await fetch('data.json'); d = res.ok ? await res.json() : {}; }
    const completed = curPos >= totalCells;
    if (d.campaigns && d.campaigns[ci]) {
      d.campaigns[ci].current   = curPos;
      d.campaigns[ci].completed = completed;
    }
    _cachedData = d;
    const pin = d.adminPIN || '1210';
    await fetch('/api/data', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin, data: d }),
    });
  } catch(e) { console.error(e); }
}

async function autoPush() {
  const status = document.getElementById('push-status');
  if (!status) return;
  status.textContent = '⏳ 保存中...';
  status.style.color = 'rgba(255,140,140,.8)';
  try {
    const d   = _cachedData || {};
    const pin = d.adminPIN || '1210';
    const res = await fetch('/api/git-push', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const r = await res.json();
    status.textContent = r.ok ? '✅ 保存完了！生徒画面に反映されます' : '❌ ' + (r.error || '失敗');
    status.style.color = r.ok ? '#86efac' : '#fca5a5';
  } catch(e) {
    status.textContent = '❌ サーバーに接続できません';
    status.style.color = '#fca5a5';
  }
  setTimeout(() => { if (status) status.textContent = ''; }, 5000);
}

/* ============================================================
   手形生成（画像を使用）
   ============================================================ */
const HAND_W = 54;  // SVG座標系での手画像の幅
const HAND_H = 70;  // SVG座標系での手画像の高さ

function makeHandprint(pos) {
  const g    = document.createElementNS(SVG_NS, 'g');
  const cx   = 160 + pos.x;
  const cy   = 135 + pos.y;
  const flip = pos.h === 1 ? -1 : 1;

  // 画像を中心基準でスケール・回転・反転
  g.setAttribute('transform',
    `translate(${cx},${cy}) rotate(${pos.rot}) scale(${(pos.sz * flip).toFixed(3)},${pos.sz}) translate(${-HAND_W/2},${-HAND_H/2})`
  );
  g.setAttribute('opacity', '0');

  const img = document.createElementNS(SVG_NS, 'image');
  img.setAttribute('href', '幽霊の手.png');
  img.setAttribute('width',  String(HAND_W));
  img.setAttribute('height', String(HAND_H));
  img.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  g.appendChild(img);
  return g;
}

/* ============================================================
   窓構築
   ============================================================ */
function buildHandprints() {
  const group = document.getElementById('handprints-group');
  group.innerHTML = '';
  handprintEls = [];
  HANDPRINT_POS.forEach(pos => {
    const el = makeHandprint(pos);
    group.appendChild(el);
    handprintEls.push(el);
  });
}

function visibleCount(pos) {
  // 目標の80%（800回）で手形が全部揃う
  const handPct = Math.min(pos / (totalCells * 0.80), 1);
  return Math.round(handPct * HANDPRINT_POS.length);
}

function refreshHandprints(animate = false) {
  const n = visibleCount(curPos);
  handprintEls.forEach((el, i) => {
    if (i < n) {
      if (el.getAttribute('opacity') === '0') {
        el.setAttribute('opacity', '1');
        if (animate && i === n - 1) {
          el.classList.add('handprint-new');
          setTimeout(() => el.classList.remove('handprint-new'), 600);
        }
      }
    } else {
      el.setAttribute('opacity', '0');
    }
  });
}

/* ============================================================
   幽霊更新（画像が徐々に近づく）
   ============================================================ */
function updateGhost() {
  const pct    = Math.min(curPos / totalCells, 1);
  const opacity = pct < 0.04 ? 0 : Math.min(0.96, (pct - 0.04) * 1.05);
  // 遠くにいる（小）→近づく（大）。scale 0.05 → 1.5
  const scale  = 0.05 + pct * 1.45;

  const el = document.getElementById('ghost-approaching');
  if (!el) return;
  el.style.opacity   = opacity.toFixed(3);
  el.style.transform = `translate(-50%,-50%) scale(${scale.toFixed(3)})`;
}

/* ============================================================
   テキスト更新
   ============================================================ */
function renderLabel() {
  const n   = visibleCount(curPos);
  const rem = Math.max(0, totalCells - curPos);
  document.getElementById('bloom-label').textContent = `🖐 手形：${n}個 ／ あと ${rem} 回で到着`;
}

function renderStats() {
  const pct = Math.min(100, Math.round(curPos / totalCells * 100));
  const rem = Math.max(0, totalCells - curPos);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="lbl">挙手回数</div><div class="val">${curPos}</div><div class="unt">/ ${totalCells}回</div></div>
    <div class="stat"><div class="lbl">あと</div><div class="val">${rem}</div><div class="unt">回で到着</div></div>
    <div class="stat"><div class="lbl">進行率</div><div class="val">${pct}</div><div class="unt">%</div></div>
  `;
}

function renderFoot() {
  const pct = curPos / totalCells;
  let msg = '窓の向こうに何かいる…？ 👀';
  if (pct >= 0.10) msg = 'なんか…近づいてきてる… 😰';
  if (pct >= 0.30) msg = 'だんだんはっきり見えてきた……👻';
  if (pct >= 0.55) msg = '窓に手形が増えてきた…！😱';
  if (pct >= 0.75) msg = 'すぐそこにいる…！！！👻💦';
  if (pct >= 0.92) msg = 'もう窓の前に…！！！😱👻😱';
  if (pct >= 1.0)  msg = '来てしまった…！！👻👻👻';
  document.getElementById('window-foot').textContent = msg;
}

/* ============================================================
   雨粒エフェクト（ガラス面）
   ============================================================ */
function initRainDrops() {
  const g = document.getElementById('rain-drops');
  for (let i = 0; i < 24; i++) {
    const x = 4 + Math.random() * 312;
    const y = 4 + Math.random() * 262;
    const r = 1.5 + Math.random() * 2.5;
    const el = document.createElementNS(SVG_NS, 'ellipse');
    el.setAttribute('cx', String(x)); el.setAttribute('cy', String(y));
    el.setAttribute('rx', String(r * 0.5)); el.setAttribute('ry', String(r));
    el.setAttribute('fill', 'rgba(160,190,255,.16)');
    g.appendChild(el);
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', String(x)); line.setAttribute('y1', String(y + r));
    line.setAttribute('x2', String(x)); line.setAttribute('y2', String(y + r + 6 + Math.random()*8));
    line.setAttribute('stroke', 'rgba(160,190,255,.10)'); line.setAttribute('stroke-width', '1');
    g.appendChild(line);
  }
}

/* ============================================================
   雨アニメーション（背景）
   ============================================================ */
function initRain() {
  const container = document.getElementById('rain');
  for (let i = 0; i < 55; i++) {
    const drop = document.createElement('div');
    drop.className = 'rain-drop';
    const h = 45 + Math.random() * 85;
    drop.style.cssText = `
      left:${Math.random()*100}vw;
      height:${h}px;
      animation-duration:${0.55 + Math.random()*.75}s;
      animation-delay:-${Math.random()*2}s;
      opacity:${0.22 + Math.random()*.32};
    `;
    container.appendChild(drop);
  }
}

/* ============================================================
   PIN認証
   ============================================================ */
function authPin() {
  const v   = document.getElementById('pin-f').value;
  const msg = document.getElementById('pin-msg');
  if (v === TEACHER_PIN) {
    isAuth = true;
    document.getElementById('pin-row').style.display     = 'none';
    document.getElementById('pt-add-area').style.display = 'block';
  } else {
    msg.className = 'pin-ng';
    msg.textContent = '暗証番号が違います';
    document.getElementById('pin-f').value = '';
    document.getElementById('pin-f').focus();
  }
}

/* ============================================================
   ポイント追加
   ============================================================ */
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function handleAdd() {
  if (isAnim || isGoal || !isAuth) return;
  const n = parseInt(document.getElementById('pt-val').value, 10);
  if (isNaN(n) || n < 1) return;

  const btn = document.getElementById('btn-add-pt');
  btn.disabled = true;
  isAnim = true;

  for (let i = 0; i < n; i++) {
    if (curPos >= totalCells) break;
    curPos++;
    savePos();
    refreshHandprints(true);
    updateGhost();
    renderLabel();
    renderStats();
    renderFoot();

    if (curPos >= totalCells) {
      isGoal = true;
      await sleep(500);
      showGoal();
      break;
    }
    if (i < n - 1) await sleep(HOP_MS);
  }

  isAnim = false;
  if (!isGoal) btn.disabled = false;
  autoPush();
}

function toggleUI() {
  const ui  = document.getElementById('bottom-ui');
  const btn = document.getElementById('ui-toggle-btn');
  const open = ui.classList.toggle('open');
  btn.textContent = open ? '✕ とじる ▼' : '🔑 操作 ▲';
}

function showGoal() {
  const overlay = document.getElementById('goal-overlay');
  overlay.classList.add('show');
  document.body.style.animation = 'screenShake .7s ease-out';
  setTimeout(() => { document.body.style.animation = ''; }, 750);
  setTimeout(() => overlay.classList.add('door-open'), 700);
  setTimeout(() => overlay.classList.add('text-show'), 2800);
}

function closeGoal() {
  const overlay = document.getElementById('goal-overlay');
  overlay.classList.remove('text-show');
  setTimeout(() => {
    overlay.classList.remove('door-open');
    setTimeout(() => overlay.classList.remove('show'), 400);
  }, 200);
}

/* ============================================================
   初期化
   ============================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  ci = parseInt(new URLSearchParams(location.search).get('ci') || '0', 10);
  await loadData();

  document.title = campName + ' ― 幽霊の窓';
  document.getElementById('hd-title').textContent = campName;

  buildHandprints();
  refreshHandprints(false);
  updateGhost();
  renderLabel();
  renderStats();
  renderFoot();
  initRainDrops();
  initRain();

  if (isGoal) {
    const panel = document.getElementById('pt-panel');
    panel.innerHTML = `<div style="text-align:center;padding:14px;font-size:1rem;font-weight:800;color:#cc1111">
      👻 幽霊が到着済みです！ 👻
      <br><button onclick="showGoal()" style="margin-top:10px;padding:9px 22px;background:linear-gradient(135deg,#7a0000,#bb1c1c);color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;">
        👁 もう一度見る
      </button>
    </div>`;
  }
});
</script>
