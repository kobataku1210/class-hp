<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班対抗 勉強タワー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #07071f;
  color: white;
  overflow-x: auto;  /* 横はbodyレベルで対応 */
  /* 縦スクロール：下が地面、上が空 */
}

/* ===== 固定背景 ===== */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ===== 山シルエット（固定） ===== */
.mountains {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 1; pointer-events: none;
}

/* ===== 固定ヘッダー ===== */
#fixed-top {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(7,7,31,0.82);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 22px 8px;
}
.header h1 {
  font-size: clamp(1rem, 2.5vw, 1.45rem);
  font-weight: 900; letter-spacing: 0.08em;
  background: linear-gradient(135deg, #fbbf24, #fde68a, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 8px rgba(251,191,36,0.35));
}
.header-right { display: flex; gap: 8px; align-items: center; }
.btn-fs {
  padding: 6px 13px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.16);
  color: rgba(255,255,255,0.65);
  border-radius: 9px; font-size: 0.78rem; font-weight: 700; cursor: pointer;
}
.btn-fs:hover { background: rgba(255,255,255,0.14); color: white; }
.date-chip {
  font-size: 0.73rem; color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 5px 11px; border-radius: 9px;
}
.ranking-bar {
  display: flex; justify-content: center; align-items: center;
  gap: 8px; padding: 7px 16px 10px;
  flex-wrap: wrap;
}
.rank-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 13px; border-radius: 18px;
  font-size: clamp(0.72rem, 1.4vw, 0.85rem); font-weight: 800;
  white-space: nowrap;
}
.rank-chip.r1 { background: rgba(251,191,36,0.18); border: 1px solid rgba(251,191,36,0.45); color: #fbbf24; }
.rank-chip.r2 { background: rgba(203,213,225,0.1); border: 1px solid rgba(203,213,225,0.3); color: #cbd5e1; }
.rank-chip.r3 { background: rgba(180,120,60,0.18); border: 1px solid rgba(180,120,60,0.38); color: #e0a06a; }
.rank-chip.ro { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.45); font-size: 0.68rem; }

/* ===== スクロールヒント ===== */
#scroll-hint {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%);
  z-index: 150;
  font-size: 0.75rem; color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 6px 16px; border-radius: 20px;
  animation: hint-blink 2.5s ease-in-out infinite;
  white-space: nowrap;
  pointer-events: none;
}
@keyframes hint-blink {
  0%,100% { opacity: 0.6; } 50% { opacity: 0; }
}

/* ===== ページコンテンツ ===== */
#top-spacer { /* height set by JS */ }

.towers-wrap {
  /* overflow は body に任せる → ページ縦スクロールが効く */
  position: relative;
  z-index: 10;
  min-width: max-content; /* 横はみ出し可 */
  padding-top: 64px; /* 頂点がヘッダーに隠れないよう上にスペースを確保 */
}
.towers-row {
  display: flex;
  align-items: flex-end; /* 地面に揃える */
  justify-content: center;
  gap: clamp(8px, 1.5vw, 22px);
  padding: 0 clamp(10px, 2vw, 30px);
  min-width: max-content;
  position: relative;
  /* height: JS で設定 */
}

/* ===== タワー列 ===== */
.tower-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
  width: clamp(88px, 10.5vw, 158px);
  flex-shrink: 0;
  animation: col-rise 0.6s ease backwards;
}
@keyframes col-rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* castle-outer: 全タワー同じ高さ（最大城の高さ）で、城は底に */
.castle-outer {
  position: relative;
  width: 100%;
  /* height: JS で設定 */
  flex-shrink: 0;
}

/* ===== 石垣 ===== */
.c-base {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: clamp(78px, 9.5vw, 138px);
  height: 38px;
  background: linear-gradient(180deg, #9c8568 0%, #6b5540 55%, #4a3828 100%);
  clip-path: polygon(6% 0%, 94% 0%, 100% 100%, 0% 100%);
}
.c-base::after {
  content: ''; position: absolute; inset: 0; clip-path: inherit;
  background: repeating-linear-gradient(90deg, transparent 0px, transparent 13px, rgba(0,0,0,0.18) 13px, rgba(0,0,0,0.18) 14.5px);
}

/* ===== 城本体（成長部分） ===== */
.c-body {
  position: absolute;
  bottom: 38px; left: 50%;
  transform: translateX(-50%);
  width: clamp(60px, 7vw, 106px);
  height: 0;
  background: linear-gradient(180deg, #f5ede0 0%, #eddfc8 100%);
  border-left: 2px solid rgba(0,0,0,0.1);
  border-right: 2px solid rgba(0,0,0,0.1);
  overflow: hidden;
  transition: height 1.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.c-body::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(180deg, transparent 0px, transparent 30px, rgba(0,0,0,0.05) 30px, rgba(0,0,0,0.05) 32px);
}
.c-body-windows {
  position: absolute; inset: 0;
  display: flex; flex-direction: column-reverse;
  gap: 30px; padding: 14px 0; align-items: center;
}
.c-win-row { display: flex; gap: clamp(8px, 1vw, 14px); }
.c-win {
  width: clamp(7px, 0.9vw, 12px);
  height: clamp(9px, 1.1vw, 15px);
  background: #2d3b5c; border-radius: 2px 2px 0 0;
  box-shadow: inset 0 0 3px rgba(255,255,255,0.12);
}

/* ===== 城上部（屋根群、底上に浮く） ===== */
.c-top {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  bottom: 38px; /* JS で更新 */
  display: flex; flex-direction: column; align-items: center;
  transition: bottom 1.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  z-index: 5;
}
.c-tier2 {
  width: clamp(68px, 8vw, 118px); height: 28px;
  background: linear-gradient(180deg, #ede0cc, #e0d0b4);
  border-left: 2px solid rgba(0,0,0,0.1);
  border-right: 2px solid rgba(0,0,0,0.1);
  position: relative;
}
.c-tier2::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: clamp(8px, 1vw, 13px); height: clamp(10px, 1.3vw, 17px);
  background: #2d3b5c; border-radius: 2px 2px 0 0;
}
.c-tier1 {
  width: clamp(50px, 6vw, 88px); height: 24px;
  background: linear-gradient(180deg, #f0e8d8, #e4d8c4);
  border-left: 2px solid rgba(0,0,0,0.1);
  border-right: 2px solid rgba(0,0,0,0.1);
}
.c-finial {
  width: 6px; height: 30px;
  background: linear-gradient(180deg, #f0c040, #c89010);
  border-radius: 3px 3px 1px 1px;
  box-shadow: 0 0 10px rgba(240,192,64,0.7), 0 0 20px rgba(240,192,64,0.3);
}

/* 屋根SVGはJSで生成 */
.c-roof { display: block; overflow: visible; flex-shrink: 0; }

/* ===== 高さラベル（城の途中に表示） ===== */
.c-height-tag {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  background: rgba(251,191,36,0.2);
  border: 1px solid rgba(251,191,36,0.4);
  color: #fbbf24;
  font-size: 0.62rem; font-weight: 800;
  padding: 2px 7px; border-radius: 8px;
  white-space: nowrap; z-index: 6;
}

/* ===== チーム情報 ===== */
.team-info {
  text-align: center; width: 100%;
  padding: 8px 4px 0;
  position: relative; z-index: 10;
  background: transparent;
}
.team-rank {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  font-size: 0.72rem; font-weight: 900; margin-bottom: 4px;
}
.rg { background: linear-gradient(135deg,#fbbf24,#d97706); color:#1a0800; }
.rs { background: linear-gradient(135deg,#e2e8f0,#94a3b8); color:#1e293b; }
.rb { background: linear-gradient(135deg,#d4933a,#8b5e1a); color:white; }
.ro { background: rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.55); }
.team-name  { font-size: clamp(0.76rem,1.3vw,0.92rem); font-weight: 800; color: rgba(255,255,255,0.9); }
.team-hours {
  font-size: clamp(0.88rem,1.6vw,1.1rem); font-weight: 900;
  color: #fbbf24; letter-spacing: 0.03em; margin-top: 1px;
}
.team-hours-unit { font-size: 0.62em; color: rgba(255,255,255,0.45); font-weight: 600; }

/* ===== 地面 ===== */
.ground {
  position: relative; z-index: 10;
  height: 52px;
  background: linear-gradient(180deg, #3a2810 0%, #2a1a08 60%, #1a0e04 100%);
  margin: 0;
}
.ground::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, transparent, rgba(201,162,39,0.5) 30%, rgba(201,162,39,0.7) 50%, rgba(201,162,39,0.5) 70%, transparent);
  box-shadow: 0 0 12px rgba(201,162,39,0.4);
}
.bottom-pad { height: 100px; background: #1a0e04; }

/* ===== 合計 ===== */
.total-bar {
  position: relative; z-index: 10;
  text-align: center;
  padding: 12px;
  font-size: 0.78rem; color: rgba(255,255,255,0.38);
  letter-spacing: 0.06em;
  background: #07071f;
}
.total-bar span { color: rgba(255,255,255,0.65); font-weight: 800; }

/* ===== 完結バナー ===== */
#finished-banner {
  position: relative; z-index: 10;
  background: linear-gradient(135deg, #0a0a2a 0%, #1a1240 50%, #0a0a2a 100%);
  border-top: 2px solid rgba(251,191,36,0.35);
  padding: 28px 20px 32px;
  text-align: center;
}
.fb-kan {
  display: inline-block;
  font-size: 0.75rem; font-weight: 900; letter-spacing: 0.18em;
  color: #fbbf24;
  border: 2px solid rgba(251,191,36,0.5);
  border-radius: 6px; padding: 3px 16px;
  margin-bottom: 14px;
  background: rgba(251,191,36,0.1);
}
.fb-hours {
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  font-weight: 900; letter-spacing: 0.04em;
  background: linear-gradient(135deg, #fbbf24, #fde68a, #f59e0b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 18px rgba(251,191,36,0.45));
  line-height: 1.1;
  margin-bottom: 6px;
}
.fb-label {
  font-size: 0.82rem; color: rgba(255,255,255,0.42);
  font-weight: 700; letter-spacing: 0.1em;
  margin-bottom: 18px;
}
.fb-msg {
  font-size: clamp(1rem, 3.5vw, 1.3rem);
  font-weight: 900; color: rgba(255,255,255,0.92);
  letter-spacing: 0.04em;
  line-height: 1.7;
}
.fb-stars {
  font-size: 1.2rem; margin-top: 14px;
  color: rgba(251,191,36,0.7); letter-spacing: 0.22em;
}

/* ===== FAB ===== */
.fab {
  position: fixed; bottom: 24px; right: 22px;
  z-index: 300; width: 62px; height: 62px;
  display: none; /* 完結のため非表示 */
  border-radius: 50%;
  background: linear-gradient(135deg, #fbbf24, #d97706);
  border: none; color: #1a0800; font-size: 1.9rem; font-weight: 900;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(251,191,36,0.5);
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.fab:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 8px 32px rgba(251,191,36,0.65); }

/* ===== モーダル ===== */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  z-index: 400; display: none;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: linear-gradient(160deg, #12163a, #1a1f4a);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 22px; padding: 28px 24px;
  width: min(480px, 96vw);
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  max-height: 90vh; overflow-y: auto;
}
/* 一括入力行 */
.bulk-row {
  display: grid;
  grid-template-columns: 80px 1fr 90px;
  align-items: center; gap: 10px;
}
.bulk-label {
  font-size: 0.85rem; font-weight: 800;
  color: rgba(255,255,255,0.75);
  white-space: nowrap;
}
.bulk-current {
  font-size: 0.72rem; color: rgba(255,255,255,0.38);
  white-space: nowrap; text-align: right;
}
.bulk-input {
  padding: 9px 11px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 10px; color: white;
  font-size: 0.95rem; font-family: inherit;
  outline: none; text-align: center; width: 100%;
  transition: border-color 0.2s;
}
.bulk-input:focus { border-color: #fbbf24; background: rgba(255,255,255,0.1); }
.bulk-input::placeholder { color: rgba(255,255,255,0.2); font-size: 0.8rem; }
.modal-box h2 { font-size: 1.05rem; font-weight: 900; color: #fbbf24; margin-bottom: 5px; }
.modal-box p  { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-bottom: 20px; }
.m-input, .m-select {
  width: 100%; padding: 12px 15px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 12px; color: white;
  font-size: 0.95rem; font-family: inherit;
  outline: none; margin-bottom: 12px;
  transition: border-color 0.2s;
}
.m-input:focus, .m-select:focus { border-color: #fbbf24; background: rgba(255,255,255,0.1); }
.m-select option { background: #12163a; }
.m-error { color: #f87171; font-size: 0.78rem; min-height: 1em; margin: -6px 0 8px; }
.m-btns { display: flex; gap: 10px; margin-top: 4px; }
.m-cancel {
  flex: 1; padding: 11px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  color: rgba(255,255,255,0.55); border-radius: 11px;
  font-size: 0.88rem; font-weight: 700; cursor: pointer;
}
.m-ok {
  flex: 2; padding: 11px;
  background: linear-gradient(135deg, #fbbf24, #d97706);
  border: none; color: #1a0800;
  border-radius: 11px; font-size: 0.92rem; font-weight: 800; cursor: pointer;
}
.m-ok:hover { opacity: 0.88; }

/* ===== 名言オーバーレイ ===== */
#quote-overlay {
  position: fixed; inset: 0; z-index: 600;
  display: none; align-items: center; justify-content: center;
  flex-direction: column;
  background: rgba(4, 4, 20, 0.93);
  backdrop-filter: blur(16px);
  padding: 12px 20px;
}
#quote-overlay.show { display: flex; }
.qo-inner {
  text-align: center; max-width: 820px; width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 0;
  animation: qo-in 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes qo-in {
  from { opacity:0; transform: scale(0.85) translateY(20px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.qo-rank-badge {
  font-size: clamp(0.82rem, 1.8vw, 1.1rem); font-weight: 900;
  letter-spacing: 0.1em; margin-bottom: 6px;
  display: inline-block; padding: 5px 20px; border-radius: 30px;
}
.qo-rank-badge.gold {
  background: rgba(251,191,36,0.18); border: 2px solid rgba(251,191,36,0.6);
  color: #fbbf24; text-shadow: 0 0 16px rgba(251,191,36,0.6);
}
.qo-rank-badge.blue {
  background: rgba(96,165,250,0.15); border: 2px solid rgba(96,165,250,0.4);
  color: #93c5fd;
}
/* 1位専用：王冠 */
.qo-crown {
  font-size: clamp(1.8rem, 4.5vw, 3rem); margin-bottom: 2px;
  animation: crown-drop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes crown-drop {
  from { opacity:0; transform:translateY(-30px) scale(0.5); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.qo-team {
  font-size: clamp(3rem, 10vw, 7rem); font-weight: 900;
  margin: 0 0 2px; letter-spacing: 0.06em; line-height: 1;
}
.qo-team.gold {
  background: linear-gradient(135deg,#fbbf24,#fff9c4,#fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 24px rgba(251,191,36,0.8));
  animation: team-pulse 1.6s ease-in-out infinite;
}
@keyframes team-pulse {
  0%,100% { filter: drop-shadow(0 0 16px rgba(251,191,36,0.7)); }
  50%      { filter: drop-shadow(0 0 38px rgba(251,191,36,1));   }
}
.qo-team.blue {
  background: linear-gradient(135deg,#93c5fd,#dbeafe,#60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.qo-cheer {
  font-size: clamp(0.82rem, 2vw, 1.1rem); font-weight: 800;
  color: rgba(255,255,255,0.82); letter-spacing: 0.12em;
  margin-bottom: 8px;
}
/* 紙吹雪 */
.qo-conf {
  position: fixed; top: -16px; border-radius: 3px; opacity: 0;
  animation: conf-fall linear forwards; pointer-events: none; z-index: 601;
}
@keyframes conf-fall {
  0%   { opacity:1; transform: translateY(0) rotate(0deg); }
  100% { opacity:0; transform: translateY(110vh) rotate(720deg); }
}
.qo-divider {
  width: 60px; height: 2px; margin: 6px auto 8px;
  border-radius: 2px; flex-shrink: 0;
}
.qo-divider.gold { background: linear-gradient(90deg,transparent,#fbbf24,transparent); }
.qo-divider.blue { background: linear-gradient(90deg,transparent,#60a5fa,transparent); }
.qo-quote {
  font-size: clamp(1rem, 2.4vw, 1.5rem); font-weight: 700;
  color: rgba(255,255,255,0.92); line-height: 1.6;
  margin-bottom: 6px; letter-spacing: 0.01em;
}
.qo-author {
  font-size: clamp(0.7rem, 1.4vw, 0.88rem);
  color: rgba(255,255,255,0.38); letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.qo-next {
  padding: 12px 48px;
  border-radius: 50px; border: none; cursor: pointer;
  font-size: clamp(0.95rem, 2.2vw, 1.15rem); font-weight: 900;
  letter-spacing: 0.1em;
  transition: transform 0.2s, box-shadow 0.2s;
}
.qo-next.gold {
  background: linear-gradient(135deg,#fbbf24,#d97706);
  color: #1a0800;
  box-shadow: 0 6px 24px rgba(251,191,36,0.45);
}
.qo-next.blue {
  background: linear-gradient(135deg,#3b82f6,#1d4ed8);
  color: #fff;
  box-shadow: 0 6px 24px rgba(59,130,246,0.4);
}
.qo-next:hover { transform: scale(1.06); }
/* 星パーティクル */
.qo-star {
  position: fixed; border-radius: 50%; pointer-events: none;
  animation: qo-star-fall var(--d) linear forwards;
}
@keyframes qo-star-fall {
  from { opacity: var(--op); transform: translate(0,0) scale(1); }
  to   { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
}

/* ===== エフェクト ===== */
#fx-overlay {
  position: fixed; inset: 0; z-index: 500;
  pointer-events: none; display: none;
  align-items: center; justify-content: center; flex-direction: column; gap: 10px;
}
#fx-overlay.show { display: flex; }
.fx-flash { position: absolute; inset: 0; background: rgba(255,245,200,0.45); animation: fx-fl 0.5s ease-out forwards; }
@keyframes fx-fl { from { opacity: 1; } to { opacity: 0; } }
.fx-text {
  position: relative; z-index: 1;
  font-size: clamp(2rem, 6vw, 3.8rem); font-weight: 900; letter-spacing: 0.1em;
  background: linear-gradient(135deg, #fbbf24, #fff, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 20px rgba(251,191,36,0.8));
  animation: fx-pop 1.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.fx-sub {
  position: relative; z-index: 1;
  font-size: clamp(0.9rem, 2.5vw, 1.3rem); font-weight: 700; color: rgba(255,255,255,0.9);
  animation: fx-pop 2s 0.15s cubic-bezier(0.34,1.56,0.64,1) both; opacity: 0;
}
@keyframes fx-pop {
  0%   { opacity:0; transform:scale(0.3); }
  70%  { opacity:1; transform:scale(1.08); }
  100% { opacity:1; transform:scale(1); }
}
.fx-pt {
  position: fixed; border-radius: 50%;
  animation: fx-pt var(--d) ease-out forwards; pointer-events: none;
}
@keyframes fx-pt {
  from { opacity:1; transform:translate(0,0) scale(1); }
  to   { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0); }
}
</style>
</head>
<body>

<!-- 背景Canvas -->
<canvas id="bg-canvas"></canvas>

<!-- 山シルエット -->
<svg class="mountains" viewBox="0 0 1400 180" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,180 L0,110 L120,55 L240,110 L360,30 L480,90 L600,10 L720,70 L840,20 L960,75 L1080,35 L1200,85 L1320,45 L1400,80 L1400,180 Z" fill="#1a1a3e" opacity="0.85"/>
  <path d="M0,180 L0,140 L180,95 L360,140 L540,80 L720,130 L900,85 L1080,125 L1260,70 L1400,110 L1400,180 Z" fill="#0d0d24" opacity="0.95"/>
</svg>

<!-- 固定ヘッダー -->

  <div class="header">
    <div>
      <h1>🏯 班対抗 勉強タワー</h1>

  <div class="ranking-bar" id="ranking-bar"></div>

</div>

<!-- 完結バナー -->
<div id="finished-banner">
  <div class="fb-kan">🏯 第１回定期テスト前 勉強タワー　完結</div>
  <div class="fb-hours">2,259<span style="font-size:0.45em;-webkit-text-fill-color:rgba(251,191,36,0.75);margin-left:4px">時間</span></div>
  <div class="fb-label">クラス合計勉強時間</div>
  <div class="fb-msg">
    テスト勉強、よく頑張りました！<br>
    みんなの努力がこのタワーに積み上がっています。<br>
    <span style="font-size:0.88em;color:rgba(255,255,255,0.6)">次のテストも一緒に頑張ろう！</span>
  </div>
  <div class="fb-stars">★ ★ ★ ★ ★</div>
</div>
<div class="bottom-pad"></div>

<!-- スクロールヒント -->

<!-- 入力ボタン -->

<!-- モーダル -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div id="s-pin">
      <h2>🔒 教員ログイン</h2>
      <p>暗証番号を入力してください</p>
      <input class="m-input" type="password" id="pin-in" placeholder="暗証番号" maxlength="20"
             onkeydown="if(event.key==='Enter')checkPin()">
      <div class="m-error" id="pin-err"></div>
      <div class="m-btns">
        <button class="m-cancel" onclick="closeModal()">キャンセル</button>
        <button class="m-ok" onclick="checkPin()">ログイン</button>
      </div>
    </div>
    <div id="s-input" style="display:none">
      <h2>📚 勉強時間を追加</h2>
      <p>追加する時間数を入力して「追加する」を押してください（空欄の班はスキップ）</p>
      <div id="bulk-rows" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"></div>
      <div class="m-error" id="hours-err"></div>
      <div class="m-btns">
        <button class="m-cancel" onclick="closeModal()">キャンセル</button>
        <button class="m-ok" onclick="submitHours()">追加する ✓</button>

</div>

<!-- 名言オーバーレイ -->
<div id="quote-overlay">
  <div class="qo-inner" id="qo-inner">
    <div class="qo-rank-badge" id="qo-badge"></div>
    <div class="qo-crown"      id="qo-crown" style="display:none"></div>
    <div class="qo-team"       id="qo-team"></div>
    <div class="qo-cheer"      id="qo-cheer" style="display:none"></div>
    <div class="qo-divider"    id="qo-divider"></div>
    <div class="qo-quote"      id="qo-quote"></div>
    <div class="qo-author"     id="qo-author"></div>
    <button class="qo-next"    id="qo-next" onclick="advanceQuote()"></button>
  </div>
</div>

<!-- エフェクト -->
<div id="fx-overlay">
  <div class="fx-flash"></div>
  <div class="fx-text" id="fx-text">📚 +3時間！</div>
  <div class="fx-sub"  id="fx-sub">2班 ・ 累計 42時間</div>
</div>

<script>
/* =========================================================
   定数
   ========================================================= */
const SCALE      = 5;   // 1時間 = 5px
const BASE_H     = 38;  // 石垣の高さ
const FIXED_TOP  = 160; // 屋根群の固定高さ（roofSVG×2 + finial 約107px + 余白53px）
const INFO_H     = 76;  // チーム情報の高さ

const ROOF_COLORS = [
  '#991b1b','#1e40af','#065f46','#6d28d9',
  '#92400e','#9d174d','#0e7490','#312e81'
];

let teams      = [];
let correctPin = '1210';
let loggedIn   = false;
let isFxing    = false;

// GitHub Pages からでもローカルサーバーに届くよう絶対URLを使用
const SERVER = 'http://localhost:3456';

/* =========================================================
   名言データ
   ========================================================= */
const PRAISE_QUOTES = [
  { text: "継続は力なり。",                                         author: "ことわざ" },
  { text: "努力した者が全て報われるとは限らん。しかし！成功した者は皆すべからく努力しておる！！", author: "鴨川源二（はじめの一歩）" },
  { text: "Hard work beats talent when talent doesn't work hard.", author: "Tim Notke" },
  { text: "The harder you work, the luckier you get.",             author: "Gary Player" },
  { text: "Success is the sum of small efforts, repeated day in and day out.", author: "Robert Collier" },
  { text: "Champions keep playing until they get it right.",       author: "Billie Jean King" },
  { text: "It always seems impossible until it's done.",           author: "Nelson Mandela" },
  { text: "Excellence is not a skill, it's an attitude.",          author: "Ralph Marston" },
  { text: "Don't watch the clock; do what it does. Keep going.",   author: "Sam Levenson" },
  { text: "Winning isn't everything, but wanting to win is.",      author: "Vince Lombardi" },
  { text: "頂点を目指せ。山の頂からしか見えない景色がある。",              author: "" },
  { text: "努力は必ず報われる。報われない努力があるとすれば、それはまだ努力が足りないからだ。", author: "王貞治" },
  { text: "The secret of getting ahead is getting started.",       author: "Mark Twain" },
  { text: "押してもだめなら引いてみな。でも諦めるな。",                    author: "" },
  { text: "One today is worth two tomorrows.",                     author: "Benjamin Franklin" },
  { text: "夢を持ち、あきらめなければ、いつか必ず叶う。",                  author: "" },
  { text: "The best way to predict the future is to create it.",  author: "Abraham Lincoln" },
];

const ENCOURAGE_QUOTES = [
  { text: "七転び八起き。",                                         author: "日本のことわざ" },
  { text: "失敗は成功のもと。",                                      author: "日本のことわざ" },
  { text: "あきらめたらそこで試合終了ですよ。",                          author: "安西先生（SLAM DUNK）" },
  { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
  { text: "Fall seven times, stand up eight.",                     author: "Japanese Proverb" },
  { text: "The comeback is always stronger than the setback.",     author: "" },
  { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
  { text: "Believe you can and you're halfway there.",             author: "Theodore Roosevelt" },
  { text: "Success is not final, failure is not fatal: It is the courage to continue that counts.", author: "Winston Churchill" },
  { text: "A journey of a thousand miles begins with a single step.", author: "Lao Tzu" },
  { text: "今日の努力が明日の自分をつくる。",                            author: "" },
  { text: "Every expert was once a beginner.",                     author: "Helen Hayes" },
  { text: "今は最下位でも、明日には歴史をつくれる。",                      author: "" },
  { text: "The only failure is not trying.",                       author: "" },
  { text: "諦めない者だけが、奇跡を起こせる。",                           author: "" },
  { text: "Stars can't shine without darkness.",                   author: "" },
  { text: "It's not about how hard you hit. It's about how hard you can get hit and keep moving forward.", author: "Rocky Balboa" },
];

/* 名言フロー管理 */
let quoteStep    = 0;  // 0=非表示, 1=1位表示, 2=最下位表示
let pendingFxIdx = 0;
let pendingFxTotal = 0;
let pendingFxCount = 0;

/* =========================================================
   初期化
   ========================================================= */
async function init() {
  drawBg();
  setDateChip();
  await loadData();
  setHeaderH();
  renderAll();
  // 地面へスクロール（描画完了後）
  requestAnimationFrame(() => requestAnimationFrame(() => {
    goGround();
    // ヒント非表示（5秒後）
    setTimeout(() => {
      const h = document.getElementById('scroll-hint');
      if (h) h.style.opacity = '0';
    }, 5000);
  }));
}

async function loadData() {
  let data = null;
  // まずローカルサーバーから取得（先生用・即時反映）
  try {
    const res = await fetch(SERVER + '/api/data', { signal: AbortSignal.timeout(1500) });
    if (res.ok) data = await res.json();
  } catch(e) { /* サーバー未起動なら無視 */ }
  // サーバーが使えない場合は GitHub Pages の静的ファイルを使用
  if (!data) {
    try {
      const res = await fetch('data.json?_=' + Date.now());
      if (res.ok) data = await res.json();
    } catch(e) { /* 何もしない */ }
  }
  if (data) {
    correctPin = data.adminPIN || '1210';
    if (data.studyTower?.teams?.length) {
      teams = data.studyTower.teams;
    } else {
      teams = Array.from({length:8}, (_,i) => ({name:`${i+1}班`, hours:0}));
    }
    if (data.className) {
      document.getElementById('h-sub').textContent = data.className;
    }
  } else {
    teams = Array.from({length:8}, (_,i) => ({name:`${i+1}班`, hours:0}));
  }
}

function setHeaderH() {
  const ft = document.getElementById('fixed-top');
  document.getElementById('top-spacer').style.height = ft.offsetHeight + 'px';
}

/* =========================================================
   スクロール
   ========================================================= */
function goGround() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}
// スクロールでヒント非表示
window.addEventListener('scroll', () => {
  const h = document.getElementById('scroll-hint');
  if (h && window.scrollY < document.body.scrollHeight - window.innerHeight - 50) {
    h.style.opacity = '0';
  }
}, { passive: true });

/* =========================================================
   描画
   ========================================================= */
function maxHours() {
  return Math.max(...teams.map(t => t.hours), 0);
}
function maxCastleH() {
  // ページが必ずスクロールできる高さを確保（最低250px のスクロール幅）
  const minH = Math.max(window.innerHeight - 100, 400);
  return Math.max(BASE_H + maxHours() * SCALE + FIXED_TOP, minH);
}
function bodyH(hours) {
  return Math.round(hours * SCALE);
}

function renderAll() {
  renderTowers();
  renderRanking();
  renderTotal();
}

function renderTowers() {
  const mch = maxCastleH();
  const row = document.getElementById('towers-row');
  const sorted = rankList();

  // 行の高さ = 最大城高さ（タワー情報はflexで城の下）
  row.style.height = mch + 'px';
  row.innerHTML = '';

  teams.forEach((team, i) => {
    const bh   = bodyH(team.hours);
    const rank = sorted.findIndex(t => t.name === team.name) + 1;
    const color = ROOF_COLORS[i % ROOF_COLORS.length];

    const col = document.createElement('div');
    col.className = 'tower-col';
    col.style.animationDelay = `${i * 0.06}s`;

    col.innerHTML = `
      <div class="castle-outer" id="co-${i}" style="height:${mch}px">
        <div class="c-base"></div>
        <div class="c-body" id="cb-${i}" style="height:${bh}px">
          <div class="c-body-windows" id="cw-${i}"></div>
        </div>
        <div class="c-top" id="ct-${i}" style="bottom:${BASE_H + bh}px">
          ${roofSVG(color, 'main')}
          ${roofSVG(color, 'top')}
          <div class="c-finial"></div>
        </div>
        ${bh > 0 ? heightTag(bh, team.hours) : ''}
      </div>
      <div class="team-info">
        <div class="team-rank ${rankCls(rank)}">${rank}</div>
        <div class="team-name">${team.name}</div>
        <div class="team-hours" id="th-${i}">${fmtH(team.hours)}</div>
      </div>
    `;
    row.appendChild(col);
    renderWindows(i, bh);
  });
}

/* 高さラベル（城の中腹あたりに表示） */
function heightTag(bh, hours) {
  const bottomPos = BASE_H + bh * 0.55;
  return `<div class="c-height-tag" style="bottom:${bottomPos}px">${hours}h</div>`;
}

/* 屋根SVG（曲線の軒先） */
function roofSVG(color, size) {
  const w  = size === 'main' ? 94 : 70;
  const h  = size === 'main' ? 32 : 24;
  const ew = w * 0.13;
  const ed = h * 0.38;
  const dk = darken(color, 0.28);
  return `<svg class="c-roof" viewBox="${-ew} 0 ${w+2*ew} ${h+ed}"
    style="width:${w+2*ew}px;height:${h+ed}px" xmlns="http://www.w3.org/2000/svg" overflow="visible">
    <path d="M${-ew},${h+ed} Q0,${h} ${w*0.2},${h*0.62} L${w/2},2 L${w*0.8},${h*0.62} Q${w},${h} ${w+ew},${h+ed} Z"
      fill="${color}" stroke="${dk}" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="${w/2-9}" y1="3" x2="${w/2+9}" y2="3"
      stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;
}

function darken(hex, amt) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*(1-amt))},${Math.round(g*(1-amt))},${Math.round(b*(1-amt))})`;
}

function renderWindows(idx, bh) {
  const el = document.getElementById(`cw-${idx}`);
  if (!el) return;
  el.innerHTML = '';
  const rows = Math.floor(bh / 44);
  for (let r = 0; r < Math.min(rows, 6); r++) {
    const row = document.createElement('div');
    row.className = 'c-win-row';
    row.innerHTML = '<div class="c-win"></div><div class="c-win"></div>';
    el.appendChild(row);
  }
}

function rankList() { return [...teams].sort((a,b) => b.hours - a.hours); }
function rankCls(r) { return ['rg','rs','rb','ro','ro','ro','ro','ro'][r-1] || 'ro'; }
function fmtH(h) {
  return `${h}<span class="team-hours-unit">h</span>`;
}

function renderRanking() {
  const sorted = rankList();
  const medals = ['🥇','🥈','🥉'];
  const cls    = ['r1','r2','r3'];
  document.getElementById('ranking-bar').innerHTML = sorted.map((t,i) => {
    const c = i < 3 ? cls[i] : 'ro';
    const m = i < 3 ? medals[i] : `${i+1}位`;
    return `<div class="rank-chip ${c}">${m} ${t.name}&ensp;${t.hours}h</div>`;
  }).join('');
}

function renderTotal() {
  const total = teams.reduce((s,t) => s + t.hours, 0);
  const avg   = teams.length ? (total/teams.length).toFixed(1) : 0;
  document.getElementById('total-bar').innerHTML =
    `クラス合計 <span>${total}時間</span> ／ 班平均 <span>${avg}時間</span>`;
}

/* =========================================================
   タワー更新（時間追加後）
   ========================================================= */
function updateAllTowers() {
  const mch     = maxCastleH();
  const row     = document.getElementById('towers-row');
  const oldH    = parseInt(row.style.height) || 0;
  const heightDiff = mch - oldH;

  // まずスクロール位置を保つため差分だけ先にスクロール
  if (heightDiff > 0) {
    window.scrollBy(0, heightDiff);
  }

  row.style.height = mch + 'px';

  teams.forEach((team, i) => {
    const bh  = bodyH(team.hours);
    const cb  = document.getElementById(`cb-${i}`);
    const ct  = document.getElementById(`ct-${i}`);
    const co  = document.getElementById(`co-${i}`);
    const th  = document.getElementById(`th-${i}`);
    if (cb) { cb.style.height = bh + 'px'; }
    if (ct) { ct.style.bottom = (BASE_H + bh) + 'px'; }
    if (co) {
      co.style.height = mch + 'px';
      // 高さタグ更新
      const tag = co.querySelector('.c-height-tag');
      if (tag) { co.removeChild(tag); }
      if (bh > 0) {
        co.insertAdjacentHTML('beforeend', heightTag(bh, team.hours));
      }
    }
    if (th) { th.innerHTML = fmtH(team.hours); }
    renderWindows(i, bh);
  });
  renderRanking();
  renderTotal();
}

/* =========================================================
   モーダル
   ========================================================= */
function openModal() {
  document.getElementById('modal').classList.add('open');
  if (loggedIn) { showStep('input'); }
  else { showStep('pin'); setTimeout(()=>document.getElementById('pin-in').focus(), 80); }
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('pin-in').value = '';
  document.getElementById('pin-err').textContent  = '';
  document.getElementById('hours-err').textContent = '';
  document.getElementById('bulk-rows').innerHTML   = '';
}
function showStep(s) {
  document.getElementById('s-pin').style.display   = s === 'pin'   ? '' : 'none';
  document.getElementById('s-input').style.display = s === 'input' ? '' : 'none';
  if (s === 'input') {
    const bulk = document.getElementById('bulk-rows');
    bulk.innerHTML = teams.map((t, i) => `
      <div class="bulk-row">
        <div class="bulk-label">${t.name}</div>
        <input class="bulk-input" type="number" id="b-in-${i}"
               placeholder="追加時間" min="0.5" step="0.5"
               onkeydown="if(event.key==='Enter')submitHours()">
        <div class="bulk-current">計 ${t.hours}h</div>
      </div>
    `).join('');
    setTimeout(() => document.getElementById('b-in-0').focus(), 80);
  }
}
function checkPin() {
  if (document.getElementById('pin-in').value === correctPin) {
    loggedIn = true;
    showStep('input');
  } else {
    document.getElementById('pin-err').textContent = '暗証番号が違います';
    document.getElementById('pin-in').value = '';
    document.getElementById('pin-in').focus();
  }
}
async function submitHours() {
  const err = document.getElementById('hours-err');
  // 各班の入力値を収集
  const updates = teams.map((t, i) => {
    const v = parseFloat(document.getElementById(`b-in-${i}`)?.value || '');
    return { idx: i, added: isNaN(v) ? 0 : v };
  }).filter(u => u.added > 0);

  if (updates.length === 0) {
    err.textContent = '少なくとも1班に時間数を入力してください'; return;
  }
  err.textContent = '';

  // 全班に加算
  updates.forEach(u => {
    teams[u.idx].hours = Math.round((teams[u.idx].hours + u.added) * 10) / 10;
  });

  closeModal();
  updateAllTowers();
  await saveData();

  // エフェクト用データを保持して名言フローへ
  const top = updates.reduce((a, b) => a.added >= b.added ? a : b);
  pendingFxIdx   = top.idx;
  pendingFxTotal = updates.reduce((s, u) => s + u.added, 0);
  pendingFxCount = updates.length;
  quoteStep = 0;
  advanceQuote();
}

/* =========================================================
   名言フロー
   ========================================================= */
function advanceQuote() {
  quoteStep++;
  const ranked = rankList();
  if (quoteStep === 1) {
    // 1位への称賛
    const team = ranked[0];
    const q    = PRAISE_QUOTES[Math.floor(Math.random() * PRAISE_QUOTES.length)];
    showQuoteOverlay('gold', '🥇 1位おめでとう！', team.name, q, '次へ →');
  } else if (quoteStep === 2) {
    // 最下位への励まし
    const team = ranked[ranked.length - 1];
    const q    = ENCOURAGE_QUOTES[Math.floor(Math.random() * ENCOURAGE_QUOTES.length)];
    showQuoteOverlay('blue', `${ranked.length}位 ${team.name}へ`, team.name, q, '終了');
  } else {
    // 終了 → 通常エフェクト
    document.getElementById('quote-overlay').classList.remove('show');
    quoteStep = 0;
    showFxBulk(pendingFxIdx, pendingFxTotal, pendingFxCount);
  }
}

function showQuoteOverlay(theme, badgeText, teamName, q, btnLabel) {
  const isGold = theme === 'gold';

  // テーマ付け
  ['qo-badge','qo-team','qo-divider','qo-next'].forEach(id => {
    const el = document.getElementById(id);
    el.className = el.className.replace(/gold|blue/g, '').trim() + ' ' + theme;
  });

  document.getElementById('qo-badge').textContent  = badgeText;
  document.getElementById('qo-quote').textContent  = `"${q.text}"`;
  document.getElementById('qo-author').textContent = q.author ? `― ${q.author}` : '';
  document.getElementById('qo-next').textContent   = btnLabel;

  // 1位専用：王冠＋チーム名大＋応援テキスト
  const crown = document.getElementById('qo-crown');
  const cheer = document.getElementById('qo-cheer');
  const team  = document.getElementById('qo-team');

  if (isGold) {
    crown.style.display = '';
    crown.textContent   = '👑';
    team.textContent    = teamName;
    cheer.style.display = '';
    cheer.textContent   = '🎉 今日の勉強王！おめでとう！ 🎉';
  } else {
    crown.style.display = 'none';
    team.textContent    = teamName;
    cheer.style.display = 'none';
  }

  // アニメーションリセット
  const inner = document.getElementById('qo-inner');
  inner.style.animation = 'none';
  requestAnimationFrame(() => { inner.style.animation = ''; });

  document.getElementById('quote-overlay').classList.add('show');

  if (isGold) {
    spawnConfetti();          // 紙吹雪
    spawnQuoteStars(theme);   // 金の星
  } else {
    spawnQuoteStars(theme);
  }
}

function spawnConfetti() {
  const colors = ['#fbbf24','#f87171','#34d399','#60a5fa','#a78bfa','#fb923c','#fff','#fde68a'];
  for (let i = 0; i < 120; i++) {
    const el  = document.createElement('div');
    el.className = 'qo-conf';
    const w   = 6 + Math.random() * 10;
    const h   = w * (0.4 + Math.random() * 0.6);
    const dur = 1.8 + Math.random() * 2.4;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      width:${w}px; height:${h}px;
      background:${colors[i % colors.length]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation: conf-fall ${dur}s ${Math.random()*1.2}s linear forwards;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + 1.3) * 1000);
  }
}

function spawnQuoteStars(theme) {
  const colors = theme === 'gold'
    ? ['#fbbf24','#fde68a','#fff','#f59e0b']
    : ['#60a5fa','#93c5fd','#fff','#3b82f6'];
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'qo-star';
    const sz  = 3 + Math.random() * 7;
    const ang = Math.random() * Math.PI * 2;
    const dist = 120 + Math.random() * 300;
    const dur  = 1.2 + Math.random() * 1.4;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      top:${20 + Math.random()*60}vh; left:${10 + Math.random()*80}vw;
      --tx:${Math.cos(ang)*dist}px; --ty:${Math.sin(ang)*dist}px;
      --d:${dur}s; --op:${0.5+Math.random()*0.5};
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), dur * 1000 + 100);
  }
}

function showFxBulk(topIdx, totalAdded, count) {
  if (isFxing) return;
  isFxing = true;
  const label = count === 1
    ? `${teams[topIdx].name}  ＋${totalAdded}時間！`
    : `${count}班  合計＋${totalAdded}時間！`;
  document.getElementById('fx-text').textContent = `📚 ${label}`;
  document.getElementById('fx-sub').textContent  =
    `クラス累計 ${teams.reduce((s,t)=>s+t.hours,0)}時間`;
  const ov = document.getElementById('fx-overlay');
  ov.classList.add('show');
  spawnPt();
  setTimeout(() => {
    ov.classList.remove('show');
    const fl = ov.querySelector('.fx-flash');
    if (fl) { fl.remove(); }
    const nf = document.createElement('div'); nf.className = 'fx-flash';
    ov.insertBefore(nf, ov.firstChild);
    isFxing = false;
  }, 2200);
}

/* =========================================================
   エフェクト
   ========================================================= */
function spawnPt() {
  const cols = ['#fbbf24','#f87171','#60a5fa','#34d399','#a78bfa','#fff'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'fx-pt';
    const sz = 4 + Math.random() * 10;
    const a  = Math.random() * Math.PI * 2;
    const d  = 100 + Math.random() * 280;
    const dur = 0.7 + Math.random() * 0.9;
    p.style.cssText = `
      width:${sz}px;height:${sz}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      top:calc(50% - ${sz/2}px);left:calc(50% - ${sz/2}px);
      --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;--d:${dur}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000 + 100);
  }
}

/* =========================================================
   保存 → GitHub へ自動プッシュ
   ========================================================= */
async function saveData() {
  showSaveStatus('⏳ 保存中...');
  try {
    // データ取得もローカルサーバー経由（最新を取得）
    const res  = await fetch(SERVER + '/api/data');
    const data = await res.json();
    data.studyTower = { teams };

    // ローカルに保存
    await fetch(SERVER + '/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: correctPin, data }),
    });
    // GitHub へ push → リロードしても消えない
    await fetch(SERVER + '/api/git-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: correctPin }),
    });
    showSaveStatus('✅ 保存・反映しました');
  } catch(e) {
    console.warn('save failed', e);
    showSaveStatus('❌ サーバーが起動していません');
  }
}

function showSaveStatus(msg) {
  let el = document.getElementById('save-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'save-status';
    el.style.cssText = `
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.75); color:#fff; padding:8px 22px;
      border-radius:20px; font-size:0.85rem; font-weight:700;
      z-index:350; white-space:nowrap; pointer-events:none;
      transition: opacity 0.4s;
    `;
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  if (!msg.startsWith('⏳')) {
    el._t = setTimeout(() => { el.style.opacity = '0'; }, 3000);
  }
}

/* =========================================================
   背景・その他
   ========================================================= */
function setDateChip() {
  const now = new Date();
  const wd  = ['日','月','火','水','木','金','土'][now.getDay()];
  document.getElementById('date-chip').textContent =
    `${now.getMonth()+1}月${now.getDate()}日（${wd}）`;
}

function drawBg() {
  const c   = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  c.width   = window.innerWidth;
  c.height  = window.innerHeight;

  const g = ctx.createLinearGradient(0, 0, 0, c.height);
  g.addColorStop(0,    '#07071f');
  g.addColorStop(0.45, '#0f0f38');
  g.addColorStop(0.75, '#1a1a50');
  g.addColorStop(1,    '#2a1a40');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, c.width, c.height);

  // 月
  const mx = c.width * 0.8, my = c.height * 0.16;
  const mr = Math.min(c.width, c.height) * 0.055;
  const mg = ctx.createRadialGradient(mx, my, 0, mx, my, mr);
  mg.addColorStop(0, 'rgba(255,245,200,.95)');
  mg.addColorStop(.7, 'rgba(240,220,150,.85)');
  mg.addColorStop(1, 'rgba(200,170,80,0)');
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI*2);
  ctx.fillStyle = mg; ctx.fill();
  const hg = ctx.createRadialGradient(mx, my, mr*.8, mx, my, mr*2.5);
  hg.addColorStop(0, 'rgba(255,240,160,.1)');
  hg.addColorStop(1, 'rgba(255,240,160,0)');
  ctx.beginPath(); ctx.arc(mx, my, mr*2.5, 0, Math.PI*2);
  ctx.fillStyle = hg; ctx.fill();

  // 星
  for (let i = 0; i < 230; i++) {
    const x = Math.random() * c.width;
    const y = Math.random() * c.height * 0.72;
    const r = .4 + Math.random() * 1.5;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${.3 + Math.random() * .7})`;
    ctx.fill();
  }
}
window.addEventListener('resize', () => { drawBg(); setHeaderH(); });

init();
