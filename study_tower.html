<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班対抗 勉強タワー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: #07071f;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* ===== 夜空背景 ===== */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ===== 山シルエット ===== */
.mountains {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 1; pointer-events: none;
}

/* ===== ヘッダー ===== */
.header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px 10px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.header-left h1 {
  font-size: clamp(1rem, 2.5vw, 1.5rem);
  font-weight: 900; letter-spacing: 0.08em;
  background: linear-gradient(135deg, #fbbf24, #fde68a, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 8px rgba(251,191,36,0.4));
}
.header-sub {
  font-size: 0.72rem; color: rgba(255,255,255,0.45);
  margin-top: 2px; letter-spacing: 0.06em;
}
.header-right { display: flex; gap: 8px; align-items: center; }
.btn-fs {
  padding: 7px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.7);
  border-radius: 10px; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}
.btn-fs:hover { background: rgba(255,255,255,0.15); }
.date-chip {
  font-size: 0.75rem; color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 5px 12px; border-radius: 10px;
}

/* ===== ランキングバー ===== */
.ranking-bar {
  position: relative; z-index: 10;
  display: flex; justify-content: center; align-items: center;
  gap: 10px; padding: 10px 16px;
  flex-wrap: wrap;
}
.rank-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 16px; border-radius: 20px;
  font-size: clamp(0.78rem, 1.5vw, 0.9rem); font-weight: 800;
  backdrop-filter: blur(6px);
  white-space: nowrap;
}
.rank-chip.r1 { background: rgba(251,191,36,0.2); border: 1px solid rgba(251,191,36,0.5); color: #fbbf24; }
.rank-chip.r2 { background: rgba(203,213,225,0.12); border: 1px solid rgba(203,213,225,0.35); color: #cbd5e1; }
.rank-chip.r3 { background: rgba(180,120,60,0.2); border: 1px solid rgba(180,120,60,0.4); color: #e0a06a; }
.rank-chip.r-other { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); font-size: 0.72rem; }

/* ===== タワーエリア ===== */
.towers-scroll {
  position: relative; z-index: 10;
  overflow-x: auto; overflow-y: visible;
  padding: 0 16px;
  -webkit-overflow-scrolling: touch;
}
.towers-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: clamp(6px, 1.5vw, 20px);
  min-width: max-content;
  margin: 0 auto;
  padding-bottom: 0;
  position: relative;
}

/* 地面ライン */
.ground-line {
  position: relative; z-index: 10;
  height: 3px;
  margin: 0 16px;
  background: linear-gradient(90deg,
    transparent, rgba(201,162,39,0.3) 20%,
    rgba(201,162,39,0.6) 50%,
    rgba(201,162,39,0.3) 80%, transparent);
  box-shadow: 0 0 12px rgba(201,162,39,0.3);
}

/* ===== タワー列 ===== */
.tower-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  width: clamp(90px, 11vw, 160px);
  animation: col-rise 0.7s ease backwards;
}
@keyframes col-rise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== 城 外枠 ===== */
.castle-outer {
  position: relative;
  width: 100%;
  height: clamp(360px, 55vh, 500px);
  flex-shrink: 0;
}

/* ===== 石垣（base） ===== */
.c-base {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: clamp(80px, 10vw, 130px);
  height: 38px;
  background: linear-gradient(180deg, #9a8468 0%, #6b5540 60%, #4a3828 100%);
  clip-path: polygon(6% 0%, 94% 0%, 100% 100%, 0% 100%);
}
.c-base::after {
  content: '';
  position: absolute; inset: 0;
  clip-path: inherit;
  background: repeating-linear-gradient(
    90deg, transparent 0px, transparent 14px,
    rgba(0,0,0,0.2) 14px, rgba(0,0,0,0.2) 15px
  );
}

/* ===== 本体（growing body） ===== */
.c-body {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  bottom: 38px;
  width: clamp(62px, 7.5vw, 104px);
  height: 0;
  background: linear-gradient(180deg, #f5ede0 0%, #eddfc8 100%);
  border-left: 2px solid rgba(0,0,0,0.12);
  border-right: 2px solid rgba(0,0,0,0.12);
  overflow: hidden;
  transition: height 1.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
/* 横線（壁の質感） */
.c-body::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    180deg, transparent 0px, transparent 28px,
    rgba(0,0,0,0.06) 28px, rgba(0,0,0,0.06) 30px
  );
}
.c-body-windows {
  position: absolute; inset: 0;
  display: flex; flex-direction: column-reverse;
  gap: 28px; padding: 14px 0;
  align-items: center;
}
.c-window-row { display: flex; gap: clamp(8px, 1vw, 14px); }
.c-window {
  width: clamp(8px, 1vw, 12px);
  height: clamp(10px, 1.3vw, 16px);
  background: #2c3a5a;
  border-radius: 2px 2px 0 0;
  box-shadow: inset 0 0 4px rgba(255,255,255,0.15);
}

/* ===== 上部グループ（fixed top, floats with body） ===== */
.c-top {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  bottom: 38px; /* updated by JS */
  display: flex; flex-direction: column; align-items: center;
  transition: bottom 1.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}

/* 二重目 */
.c-tier2 {
  width: clamp(72px, 8.5vw, 116px);
  height: 30px;
  background: linear-gradient(180deg, #ede1cc 0%, #e0d0b4 100%);
  border-left: 2px solid rgba(0,0,0,0.1);
  border-right: 2px solid rgba(0,0,0,0.1);
  position: relative;
}
.c-tier2::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: clamp(9px, 1.1vw, 14px); height: clamp(11px, 1.4vw, 18px);
  background: #2c3a5a; border-radius: 2px 2px 0 0;
}

/* 屋根SVG */
.c-roof { display: block; overflow: visible; flex-shrink: 0; }

/* 三重目（天守）*/
.c-tier1 {
  width: clamp(54px, 6.5vw, 88px);
  height: 26px;
  background: linear-gradient(180deg, #f0e8d8 0%, #e4d8c4 100%);
  border-left: 2px solid rgba(0,0,0,0.1);
  border-right: 2px solid rgba(0,0,0,0.1);
}

/* 相輪（finial） */
.c-finial {
  width: 6px; height: 32px;
  background: linear-gradient(180deg, #f0c040, #c8960a);
  border-radius: 3px 3px 1px 1px;
  box-shadow: 0 0 10px rgba(240,192,64,0.7), 0 0 20px rgba(240,192,64,0.4);
}

/* ===== チーム情報 ===== */
.team-info { text-align: center; width: 100%; }
.team-rank {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 0.75rem; font-weight: 900; margin-bottom: 5px;
}
.rg { background: linear-gradient(135deg,#fbbf24,#d97706); color: #1a0800; }
.rs { background: linear-gradient(135deg,#e2e8f0,#94a3b8); color: #1e293b; }
.rb { background: linear-gradient(135deg,#d4933a,#8b5e1a); color: white; }
.ro { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.55); }
.team-name { font-size: clamp(0.78rem, 1.4vw, 0.95rem); font-weight: 800; color: rgba(255,255,255,0.92); }
.team-hours {
  font-size: clamp(0.9rem, 1.8vw, 1.2rem); font-weight: 900;
  color: #fbbf24; letter-spacing: 0.04em; margin-top: 2px;
}
.team-hours-unit { font-size: 0.65em; color: rgba(255,255,255,0.5); font-weight: 600; }

/* ===== 合計 ===== */
.total-bar {
  position: relative; z-index: 10;
  text-align: center;
  padding: 10px 16px 80px;
  font-size: 0.78rem; color: rgba(255,255,255,0.4);
  letter-spacing: 0.06em;
}
.total-bar span { color: rgba(255,255,255,0.7); font-weight: 800; }

/* ===== フローティングボタン ===== */
.fab {
  position: fixed; bottom: 26px; right: 24px;
  z-index: 200; width: 62px; height: 62px;
  border-radius: 50%;
  background: linear-gradient(135deg, #fbbf24, #d97706);
  border: none; color: #1a0800;
  font-size: 1.8rem; font-weight: 900;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(251,191,36,0.5);
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.fab:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 8px 32px rgba(251,191,36,0.65); }

/* ===== モーダル ===== */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 300; display: none;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: linear-gradient(160deg, #12163a, #1a1f4a);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 22px; padding: 32px 28px;
  width: min(420px, 94vw);
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.modal-box h2 { font-size: 1.05rem; font-weight: 900; color: #fbbf24; margin-bottom: 5px; }
.modal-box p { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-bottom: 20px; }
.m-input, .m-select {
  width: 100%; padding: 12px 15px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 12px; color: white;
  font-size: 0.95rem; font-family: inherit;
  outline: none; margin-bottom: 12px;
  transition: border-color 0.2s;
}
.m-input:focus, .m-select:focus { border-color: #fbbf24; }
.m-select option { background: #12163a; }
.m-error { color: #f87171; font-size: 0.8rem; min-height: 1.1em; margin: -6px 0 8px; }
.m-btns { display: flex; gap: 10px; margin-top: 4px; }
.m-cancel {
  flex: 1; padding: 11px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.55); border-radius: 11px;
  font-size: 0.88rem; font-weight: 700; cursor: pointer;
}
.m-ok {
  flex: 2; padding: 11px;
  background: linear-gradient(135deg, #fbbf24, #d97706);
  border: none; color: #1a0800;
  border-radius: 11px; font-size: 0.92rem; font-weight: 800; cursor: pointer;
  transition: opacity 0.15s;
}
.m-ok:hover { opacity: 0.88; }

/* ===== 進化エフェクト ===== */
#fx-overlay {
  position: fixed; inset: 0; z-index: 500;
  pointer-events: none; display: none;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
}
#fx-overlay.show { display: flex; }
.fx-flash { position: absolute; inset: 0; background: rgba(255,255,200,0.5); animation: fx-flash 0.5s ease-out forwards; }
@keyframes fx-flash { from { opacity: 1; } to { opacity: 0; } }
.fx-text {
  position: relative; z-index: 1;
  font-size: clamp(2rem, 6vw, 4rem); font-weight: 900;
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, #fbbf24, #fff, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 20px rgba(251,191,36,0.8));
  animation: fx-pop 1.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.fx-sub {
  position: relative; z-index: 1;
  font-size: clamp(0.9rem, 2.5vw, 1.3rem); font-weight: 700;
  color: rgba(255,255,255,0.9);
  animation: fx-pop 2s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
  opacity: 0;
}
@keyframes fx-pop {
  0%   { opacity: 0; transform: scale(0.3); }
  70%  { opacity: 1; transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}
.fx-particle {
  position: fixed; border-radius: 50%;
  animation: fx-particle var(--d) ease-out forwards;
  pointer-events: none;
}
@keyframes fx-particle {
  from { opacity: 1; transform: translate(0,0) scale(1); }
  to   { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0); }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- 山シルエット -->
<svg class="mountains" viewBox="0 0 1400 180" preserveAspectRatio="xMidYMax slice"
     xmlns="http://www.w3.org/2000/svg">
  <path d="M0,180 L0,110 L120,55 L240,110 L360,30 L480,90 L600,10 L720,70 L840,20 L960,75 L1080,35 L1200,85 L1320,45 L1400,80 L1400,180 Z"
        fill="#1a1a3e" opacity="0.85"/>
  <path d="M0,180 L0,140 L180,95 L360,140 L540,80 L720,130 L900,85 L1080,125 L1260,70 L1400,110 L1400,180 Z"
        fill="#0d0d24" opacity="0.95"/>
</svg>

<!-- ヘッダー -->
<div class="header">
  <div class="header-left">
    <h1>🏯 班対抗 勉強タワー</h1>
    <div class="header-sub" id="h-sub">3年5組 ― 積み上げた時間が城を高くする</div>
  </div>
  <div class="header-right">
    <div class="date-chip" id="date-chip"></div>
    <button class="btn-fs" onclick="toggleFS()">⛶ 全画面</button>
  </div>
</div>

<!-- ランキングバー -->
<div class="ranking-bar" id="ranking-bar"></div>

<!-- タワーエリア -->
<div class="towers-scroll">
  <div class="towers-row" id="towers-row"></div>
</div>

<!-- 地面ライン -->
<div class="ground-line"></div>

<!-- 合計 -->
<div class="total-bar" id="total-bar"></div>

<!-- 入力ボタン -->
<button class="fab" onclick="openModal()" title="勉強時間を入力">＋</button>

<!-- モーダル -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <!-- Step PIN -->
    <div id="s-pin">
      <h2>🔒 教員ログイン</h2>
      <p>暗証番号を入力してください</p>
      <input class="m-input" type="password" id="pin-in" placeholder="暗証番号" maxlength="20"
             onkeydown="if(event.key==='Enter')checkPin()">
      <div class="m-error" id="pin-err"></div>
      <div class="m-btns">
        <button class="m-cancel" onclick="closeModal()">キャンセル</button>
        <button class="m-ok" onclick="checkPin()">ログイン</button>
      </div>
    </div>
    <!-- Step Input -->
    <div id="s-input" style="display:none">
      <h2>📚 勉強時間を追加</h2>
      <p>班と追加する時間数を入力してください</p>
      <select class="m-select" id="team-sel"></select>
      <input class="m-input" type="number" id="hours-in"
             placeholder="追加する時間数（例：2.5）" min="0.5" step="0.5"
             onkeydown="if(event.key==='Enter')submitHours()">
      <div class="m-error" id="hours-err"></div>
      <div class="m-btns">
        <button class="m-cancel" onclick="closeModal()">キャンセル</button>
        <button class="m-ok" onclick="submitHours()">追加する ✓</button>
      </div>
    </div>
  </div>
</div>

<!-- エフェクトオーバーレイ -->
<div id="fx-overlay">
  <div class="fx-flash"></div>
  <div class="fx-text" id="fx-text">📚 +5時間！</div>
  <div class="fx-sub"  id="fx-sub">2班 ・ 累計 42時間</div>
</div>

<script>
/* ========================================================
   設定
   ======================================================== */
const ROOF_COLORS = [
  '#991b1b','#1e40af','#065f46','#6d28d9',
  '#92400e','#9d174d','#0e7490','#312e81'
];
const BASE_H     = 38;   // 石垣の高さ px
const MAX_BODY_H = 300;  // 最大成長量 px

let teams      = [];
let correctPin = '1210';
let loggedIn   = false;
let isFxing    = false;

/* ========================================================
   初期化
   ======================================================== */
async function init() {
  drawBg();
  setDateChip();
  await loadData();
  renderAll();
}

async function loadData() {
  try {
    const res  = await fetch('data.json?_=' + Date.now());
    const data = await res.json();
    correctPin = data.adminPIN || '1210';
    if (data.studyTower?.teams?.length) {
      teams = data.studyTower.teams;
    } else {
      teams = Array.from({length:8}, (_,i) => ({name:`${i+1}班`, hours:0}));
    }
    if (data.className) {
      document.getElementById('h-sub').textContent = data.className + ' ― 積み上げた時間が城を高くする';
    }
  } catch(e) {
    teams = Array.from({length:8}, (_,i) => ({name:`${i+1}班`, hours:0}));
  }
}

/* ========================================================
   描画
   ======================================================== */
function renderAll() {
  renderTowers();
  renderRanking();
  renderTotal();
}

function getBodyH(hours) {
  const maxH = Math.max(...teams.map(t => t.hours), 1);
  return Math.max(0, Math.round((hours / maxH) * MAX_BODY_H));
}

function renderTowers() {
  const row = document.getElementById('towers-row');
  row.innerHTML = '';
  const sorted = rankList();

  teams.forEach((team, i) => {
    const bh    = getBodyH(team.hours);
    const rank  = sorted.findIndex(t => t.name === team.name) + 1;
    const color = ROOF_COLORS[i % ROOF_COLORS.length];

    const col = document.createElement('div');
    col.className = 'tower-col';
    col.style.animationDelay = `${i * 0.07}s`;

    col.innerHTML = `
      <div class="castle-outer" id="co-${i}">
        <div class="c-base"></div>
        <div class="c-body" id="cb-${i}" style="height:${bh}px">
          <div class="c-body-windows" id="cw-${i}"></div>
        </div>
        <div class="c-top" id="ct-${i}" style="bottom:${BASE_H + bh}px">
          <div class="c-tier2"></div>
          ${roofSVG(color, 'main')}
          <div class="c-tier1"></div>
          ${roofSVG(color, 'top')}
          <div class="c-finial"></div>
        </div>
      </div>
      <div class="team-info">
        <div class="team-rank ${rankCls(rank)}">${rank}</div>
        <div class="team-name">${team.name}</div>
        <div class="team-hours" id="th-${i}">${team.hours}<span class="team-hours-unit">h</span></div>
      </div>
    `;
    row.appendChild(col);
    renderWindows(i, bh);
  });
}

/* 屋根SVG（曲がった軒先） */
function roofSVG(color, size) {
  const w = size === 'main' ? 96 : 72;
  const h = size === 'main' ? 34 : 26;
  const ew = w * 0.12; // eave extra width
  const ed = h * 0.35; // eave droop
  const dark = darken(color, 0.25);
  return `<svg class="c-roof" viewBox="${-ew} 0 ${w+2*ew} ${h+ed}"
    style="width:${w+2*ew}px;height:${h+ed}px"
    xmlns="http://www.w3.org/2000/svg" overflow="visible">
    <path d="M${-ew},${h+ed} Q0,${h} ${w*0.2},${h*0.65} L${w/2},2 L${w*0.8},${h*0.65} Q${w},${h} ${w+ew},${h+ed} Z"
      fill="${color}" stroke="${dark}" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="${w/2-10}" y1="3" x2="${w/2+10}" y2="3" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;
}

function darken(hex, amount) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*(1-amount))},${Math.round(g*(1-amount))},${Math.round(b*(1-amount))})`;
}

function renderWindows(idx, bh) {
  const el = document.getElementById(`cw-${idx}`);
  if (!el) return;
  el.innerHTML = '';
  const rows = Math.floor(bh / 42);
  for (let r = 0; r < Math.min(rows, 5); r++) {
    const row = document.createElement('div');
    row.className = 'c-window-row';
    row.innerHTML = '<div class="c-window"></div><div class="c-window"></div>';
    el.appendChild(row);
  }
}

function rankList() {
  return [...teams].sort((a,b) => b.hours - a.hours);
}
function rankCls(rank) {
  return ['rg','rs','rb','ro','ro','ro','ro','ro'][rank-1] || 'ro';
}

function renderRanking() {
  const bar    = document.getElementById('ranking-bar');
  const sorted = rankList();
  const medals = ['🥇','🥈','🥉'];
  const cls    = ['r1','r2','r3'];
  bar.innerHTML = sorted.map((t,i) => {
    const c = i < 3 ? cls[i] : 'r-other';
    const m = i < 3 ? medals[i] : `${i+1}位`;
    return `<div class="rank-chip ${c}">${m} ${t.name}&emsp;${t.hours}時間</div>`;
  }).join('');
}

function renderTotal() {
  const total = teams.reduce((s,t) => s + t.hours, 0);
  const avg   = teams.length ? (total / teams.length).toFixed(1) : 0;
  document.getElementById('total-bar').innerHTML =
    `クラス合計 <span>${total}時間</span> ／ 班平均 <span>${avg}時間</span>`;
}

/* ========================================================
   タワーアップデート（追加時）
   ======================================================== */
function updateAllTowers() {
  teams.forEach((_, i) => {
    const bh = getBodyH(teams[i].hours);
    const cb = document.getElementById(`cb-${i}`);
    const ct = document.getElementById(`ct-${i}`);
    if (cb) cb.style.height  = bh + 'px';
    if (ct) ct.style.bottom  = (BASE_H + bh) + 'px';
    renderWindows(i, bh);
    const th = document.getElementById(`th-${i}`);
    if (th) th.innerHTML = teams[i].hours + '<span class="team-hours-unit">h</span>';
  });
  renderRanking();
  renderTotal();
}

/* ========================================================
   進化エフェクト
   ======================================================== */
function showFx(teamIdx, added) {
  if (isFxing) return;
  isFxing = true;

  document.getElementById('fx-text').textContent = `📚 ＋${added}時間！`;
  document.getElementById('fx-sub').textContent  =
    `${teams[teamIdx].name} ・ 累計 ${teams[teamIdx].hours}時間`;

  const overlay = document.getElementById('fx-overlay');
  overlay.classList.add('show');
  spawnParticles();

  setTimeout(() => {
    overlay.classList.remove('show');
    // flashを再生成するためにDOMを少し整理
    const flash = overlay.querySelector('.fx-flash');
    if (flash) { flash.remove(); }
    const newFlash = document.createElement('div');
    newFlash.className = 'fx-flash';
    overlay.insertBefore(newFlash, overlay.firstChild);
    isFxing = false;
  }, 2200);
}

function spawnParticles() {
  const colors = ['#fbbf24','#f87171','#60a5fa','#34d399','#a78bfa','#ffffff'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'fx-particle';
    const sz    = 4 + Math.random() * 10;
    const angle = Math.random() * Math.PI * 2;
    const dist  = 100 + Math.random() * 280;
    const dur   = 0.7 + Math.random() * 0.9;
    p.style.cssText = `
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      top:calc(50% - ${sz/2}px);
      left:calc(50% - ${sz/2}px);
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      --d:${dur}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000 + 100);
  }
}

/* ========================================================
   モーダル
   ======================================================== */
function openModal() {
  document.getElementById('modal').classList.add('open');
  if (loggedIn) {
    showStep('input');
  } else {
    showStep('pin');
    setTimeout(() => document.getElementById('pin-in').focus(), 80);
  }
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('pin-in').value    = '';
  document.getElementById('hours-in').value  = '';
  document.getElementById('pin-err').textContent   = '';
  document.getElementById('hours-err').textContent = '';
}
function showStep(s) {
  document.getElementById('s-pin').style.display   = s === 'pin'   ? '' : 'none';
  document.getElementById('s-input').style.display = s === 'input' ? '' : 'none';
  if (s === 'input') buildTeamSelect();
}
function buildTeamSelect() {
  document.getElementById('team-sel').innerHTML = teams.map((t,i) =>
    `<option value="${i}">${t.name}（現在 ${t.hours}時間）</option>`
  ).join('');
  setTimeout(() => document.getElementById('hours-in').focus(), 80);
}
function checkPin() {
  if (document.getElementById('pin-in').value === correctPin) {
    loggedIn = true;
    document.getElementById('pin-err').textContent = '';
    showStep('input');
  } else {
    document.getElementById('pin-err').textContent = '暗証番号が違います';
    document.getElementById('pin-in').value = '';
    document.getElementById('pin-in').focus();
  }
}
async function submitHours() {
  const idx   = parseInt(document.getElementById('team-sel').value);
  const hours = parseFloat(document.getElementById('hours-in').value);
  const errEl = document.getElementById('hours-err');
  if (isNaN(hours) || hours <= 0) {
    errEl.textContent = '正しい時間数を入力してください'; return;
  }
  errEl.textContent = '';
  const added = Math.round(hours * 10) / 10;
  teams[idx].hours = Math.round((teams[idx].hours + added) * 10) / 10;
  closeModal();
  updateAllTowers();
  showFx(idx, added);
  await saveData();
}

/* ========================================================
   保存
   ======================================================== */
async function saveData() {
  try {
    const res  = await fetch('data.json?_=' + Date.now());
    const data = await res.json();
    data.studyTower = { teams };
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: correctPin, data }),
    });
  } catch(e) { console.warn('save failed', e); }
}

/* ========================================================
   ユーティリティ
   ======================================================== */
function setDateChip() {
  const now = new Date();
  const d   = ['日','月','火','水','木','金','土'];
  document.getElementById('date-chip').textContent =
    `${now.getMonth()+1}月${now.getDate()}日（${d[now.getDay()]}）`;
}

function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}

/* ========================================================
   夜空背景（Canvas）
   ======================================================== */
function drawBg() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  // グラデーション空
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0,   '#07071f');
  grad.addColorStop(0.4, '#0f0f38');
  grad.addColorStop(0.7, '#1a1a4e');
  grad.addColorStop(1,   '#2a1a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 月
  const moonX = canvas.width * 0.82;
  const moonY = canvas.height * 0.14;
  const moonR = Math.min(canvas.width, canvas.height) * 0.055;
  const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR);
  moonGrad.addColorStop(0,   'rgba(255,245,200,0.95)');
  moonGrad.addColorStop(0.7, 'rgba(240,220,150,0.85)');
  moonGrad.addColorStop(1,   'rgba(200,170,80,0)');
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
  ctx.fillStyle = moonGrad;
  ctx.fill();
  // 月の光輪
  const halo = ctx.createRadialGradient(moonX, moonY, moonR*0.8, moonX, moonY, moonR*2.5);
  halo.addColorStop(0, 'rgba(255,240,160,0.12)');
  halo.addColorStop(1, 'rgba(255,240,160,0)');
  ctx.beginPath();
  ctx.arc(moonX, moonY, moonR * 2.5, 0, Math.PI * 2);
  ctx.fillStyle = halo;
  ctx.fill();

  // 星
  for (let i = 0; i < 220; i++) {
    const x  = Math.random() * canvas.width;
    const y  = Math.random() * canvas.height * 0.75;
    const r  = 0.4 + Math.random() * 1.6;
    const op = 0.3 + Math.random() * 0.7;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${op})`;
    ctx.fill();
  }
}
window.addEventListener('resize', () => { drawBg(); });

/* ========================================================
   起動
   ======================================================== */
init();
</script>
