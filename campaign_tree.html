<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>挙手キャンペーン ― 桜の木</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  min-height: 100vh;
  background: linear-gradient(160deg, #dbeafe 0%, #f0e9f9 38%, #fce7f3 68%, #fff5f7 100%);
  color: #1e293b;
}

/* ===== 背景花びら ===== */
.petals-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.petal-bg  { position:absolute; opacity:0; animation:bgpetal linear infinite; }
@keyframes bgpetal {
  0%   { opacity:0;   transform:translateY(-20px) rotate(0deg)    translateX(0); }
  8%   { opacity:.3; }
  92%  { opacity:.2;  }
  100% { opacity:0;   transform:translateY(110vh) rotate(420deg)  translateX(var(--drift,0px)); }
}

/* ===== ページ ===== */
.page { position:relative; z-index:1; max-width:520px; margin:0 auto; padding:0 16px 60px; }

/* ===== ヘッダー ===== */
.hd { padding:20px 0 14px; text-align:center; position:relative; }
.back-btn {
  position:absolute; top:24px; left:0;
  background:rgba(255,182,193,.28); border:1px solid rgba(255,182,193,.55);
  color:#be185d; padding:6px 14px; border-radius:20px;
  font-size:.78rem; font-weight:700; text-decoration:none;
}
.back-btn:hover { background:rgba(255,182,193,.48); }
.hd-badge {
  display:inline-block; background:rgba(255,182,193,.22);
  border:1px solid rgba(255,182,193,.48); padding:3px 16px;
  border-radius:16px; font-size:.76rem; letter-spacing:.1em; color:#be185d; margin-bottom:8px;
}
.hd-title {
  font-size:clamp(1.4rem,5vw,2rem); font-weight:900;
  color:#9d174d; text-shadow:0 2px 10px rgba(190,24,93,.15); margin-bottom:4px;
}
.hd-sub { font-size:.78rem; color:#db2777; opacity:.72; letter-spacing:.06em; }

/* ===== 桜ツリーカード ===== */
.tree-card {
  background:linear-gradient(170deg, #e0f2fe 0%, #f0e8fb 50%, #fdf5f0 100%);
  border-radius:24px; padding:14px 10px 12px;
  box-shadow:0 8px 32px rgba(190,24,93,.12), 0 2px 8px rgba(0,0,0,.06);
  border:1px solid rgba(255,182,193,.35);
  margin-bottom:16px;
}
.tree-label {
  text-align:center; font-size:.76rem; font-weight:800;
  color:#be185d; letter-spacing:.08em; margin-bottom:8px;
}
#tree-svg {
  width:100%; display:block;
  filter:drop-shadow(0 8px 18px rgba(190,24,93,.14));
}
.tree-foot {
  text-align:center; font-size:.85rem; font-weight:800;
  color:#9d174d; margin-top:8px; letter-spacing:.04em;
}

/* ===== ステータス ===== */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.stat {
  background:rgba(255,255,255,.88); backdrop-filter:blur(6px);
  border-radius:14px; padding:12px 8px; text-align:center;
  box-shadow:0 2px 10px rgba(190,24,93,.08); border:1px solid rgba(255,182,193,.32);
}
.stat .lbl { font-size:.64rem; color:#db2777; font-weight:700; margin-bottom:2px; }
.stat .val { font-size:1.45rem; font-weight:900; color:#9d174d; line-height:1; }
.stat .unt { font-size:.64rem; color:#f9a8d4; }

/* ===== ポイント追加パネル ===== */
.pt-panel {
  background:rgba(255,255,255,.9); backdrop-filter:blur(8px);
  border-radius:18px; padding:20px;
  box-shadow:0 4px 18px rgba(190,24,93,.1);
  border:1px solid rgba(255,182,193,.38); margin-bottom:16px;
}
.pt-title { font-size:.9rem; font-weight:800; color:#9d174d; margin-bottom:14px; }
.pin-row  { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.pin-f {
  padding:9px 13px; border:2px solid #fbcfe8; border-radius:10px;
  font-size:1rem; text-align:center; letter-spacing:.2em; width:130px;
  font-family:inherit; outline:none; transition:border-color .2s;
}
.pin-f:focus { border-color:#db2777; }
.btn-auth {
  padding:9px 18px; background:linear-gradient(135deg,#be185d,#ec4899);
  color:#fff; border:none; border-radius:10px;
  font-size:.88rem; font-weight:700; cursor:pointer;
}
.btn-auth:hover { opacity:.9; }
.pin-ng { color:#ef4444; font-size:.82rem; }
.pt-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.pt-input {
  padding:10px 13px; border:2px solid #fbcfe8; border-radius:10px;
  font-size:1.1rem; font-weight:700; text-align:center; width:90px;
  outline:none; font-family:inherit; color:#9d174d;
}
.pt-input:focus { border-color:#db2777; }
.btn-add-pt {
  padding:10px 22px; background:linear-gradient(135deg,#be185d,#ec4899);
  color:#fff; border:none; border-radius:10px;
  font-size:.95rem; font-weight:800; cursor:pointer;
  box-shadow:0 3px 12px rgba(190,24,93,.32);
  transition:opacity .15s, transform .1s;
}
.btn-add-pt:hover:not(:disabled) { opacity:.88; transform:translateY(-1px); }
.btn-add-pt:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.pt-hint { font-size:.73rem; color:#f9a8d4; margin-top:8px; }

/* ===== ゴールオーバーレイ ===== */
#goal-overlay {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(157,23,77,.55); backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
}
#goal-overlay.show { display:flex; }
.goal-card {
  background:#fff; border-radius:24px; padding:40px 28px;
  text-align:center; max-width:320px; width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.28);
  animation:gpop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes gpop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
.goal-icon { font-size:4rem; margin-bottom:14px; animation:gbounce .9s ease-out .5s both; }
@keyframes gbounce {
  0%  {transform:translateY(-20px) rotate(-10deg);}
  60% {transform:translateY(6px)   rotate(4deg);}
  100%{transform:translateY(0)     rotate(0);}
}
.goal-ttl { font-size:1.9rem; font-weight:900; color:#9d174d; margin-bottom:8px; letter-spacing:.1em; }
.goal-msg { font-size:.93rem; color:#475569; line-height:1.78; }
.goal-cls {
  margin-top:20px; padding:12px 32px;
  background:linear-gradient(135deg,#be185d,#ec4899);
  color:#fff; border:none; border-radius:12px;
  font-size:1rem; font-weight:700; cursor:pointer;
}

/* ===== 紙吹雪（花びら） ===== */
.confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
.conf { position:absolute; top:-16px; opacity:0; animation:cfall linear forwards; }
@keyframes cfall {
  0%   { opacity:1;   transform:translateY(0)     rotate(0)     translateX(0); }
  100% { opacity:.1;  transform:translateY(112vh) rotate(560deg) translateX(var(--cdrift,0px)); }
}

footer { text-align:center; padding:22px 0 0; color:#db2777; font-size:.76rem; opacity:.6; }
footer a { color:#db2777; text-decoration:none; font-weight:700; }
footer a:hover { opacity:1; }
</style>
</head>

/* ============================================================

/* ============================================================

async function loadData() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) return;
    const d = await res.json();
    _cachedData = d;
    if (d.campaigns && d.campaigns[ci]) {
      const c    = d.campaigns[ci];
      curPos     = c.current   ?? 0;
      totalCells = c.total     ?? 30;
      campName   = c.name      || '挙手キャンペーン';
      isGoal     = c.completed || curPos >= totalCells;
    } else if (d.sugoroku) {
      curPos     = d.sugoroku.current       ?? 0;
      totalCells = d.sugoroku.total         ?? 30;
      campName   = d.sugoroku.campaignName || '挙手キャンペーン';
      isGoal     = curPos >= totalCells;
    }
  } catch(e) { console.error(e); }
}

async function savePos() {
  try {
    // 最新の data.json を取得（キャッシュがあれば使う）
    let d = _cachedData;
    if (!d) {
      const res = await fetch('data.json');
      d = res.ok ? await res.json() : {};
    }
    const completed = curPos >= totalCells;
    if (d.campaigns && d.campaigns[ci]) {
      d.campaigns[ci].current   = curPos;
      d.campaigns[ci].completed = completed;
    }
    _cachedData = d;
    const pin = d.adminPIN || '1210';
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin, data: d }),
    });
  } catch(e) { console.error(e); }
}

async function pushGitHub() {
  const status = document.getElementById('push-status');
  status.textContent = '⏳ GitHubに送信中...';
  status.style.color = '#f9a8d4';
  try {
    const d = _cachedData || {};
    const pin = d.adminPIN || '1210';
    const res = await fetch('/api/git-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const result = await res.json();
    if (result.ok) {
      status.textContent = '🚀 反映しました！1〜3分後に生徒画面に表示されます';
      status.style.color = '#86efac';
    } else {
      status.textContent = '❌ ' + (result.error || '失敗しました');
      status.style.color = '#fca5a5';
    }
  } catch(e) {
    status.textContent = '❌ サーバーに接続できません';
    status.style.color = '#fca5a5';
  }
  setTimeout(() => { status.textContent = ''; }, 6000);
}

/* ============================================================
   桜クラスター SVG 構築
   ============================================================ */

/**
 * 5枚花びらの桜を1輪生成する
 * @param {number} cx     - クラスター内 X オフセット
 * @param {number} cy     - クラスター内 Y オフセット
 * @param {number} size   - 花のサイズ（半径基準）
 * @param {number} rot    - 全体回転角（deg）
 * @param {string} pinkA  - 奇数花びら色
 * @param {string} pinkB  - 偶数花びら色
 */
function makeSakura(cx, cy, size, rot, pinkA, pinkB) {
  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('transform', `translate(${cx},${cy}) rotate(${rot})`);

  const pd = size * 0.54;   // 花びら中心の距離
  const pr = size * 0.63;   // 花びらの長さ（ry）
  const pw = size * 0.36;   // 花びらの幅（rx）

  for (let i = 0; i < 5; i++) {
    const p = document.createElementNS(SVG_NS, 'ellipse');
    p.setAttribute('cx', '0');
    p.setAttribute('cy', String(-pd));
    p.setAttribute('rx', String(pw));
    p.setAttribute('ry', String(pr));
    p.setAttribute('fill', i % 2 === 0 ? pinkA : pinkB);
    p.setAttribute('opacity', '0.88');
    p.setAttribute('transform', `rotate(${i * 72})`);
    g.appendChild(p);
  }

  // 花芯（白）
  const c = document.createElementNS(SVG_NS, 'circle');
  c.setAttribute('r',    String(size * 0.26));
  c.setAttribute('fill', '#fff4f7');
  g.appendChild(c);

  return g;
}

function buildBlossoms() {
  const g = document.getElementById('blossoms-group');
  g.innerHTML = '';
  blossomEls  = [];

  BLOSSOM_POS.forEach(({ x, y }, idx) => {
    const cfg   = CLUSTER_CFG[idx % CLUSTER_CFG.length];
    const pinks = PETAL_PINKS[idx % PETAL_PINKS.length];

    const outer = document.createElementNS(SVG_NS, 'g');
    outer.setAttribute('transform', `translate(${x},${y})`);

    const inner = document.createElementNS(SVG_NS, 'g');
    inner.setAttribute('class', 'blossom-inner');
    inner.style.transform       = 'scale(0)';
    inner.style.transformOrigin = '0 0';
    inner.style.opacity         = '0';

    // クラスター内の各花びら（dx, dy, size, rotation）
    cfg.forEach(([dx, dy, sz, rot]) => {
      inner.appendChild(makeSakura(dx, dy, sz, rot, pinks[0], pinks[1]));
    });

    outer.appendChild(inner);
    g.appendChild(outer);
    blossomEls.push(inner);
  });
}

/* curPos に合わせて即座に表示（アニメなし） */
function refreshBlossoms() {
  const show = visibleCount();
  blossomEls.forEach((el, i) => {
    const on = i < show;
    el.style.transform = on ? 'scale(1)' : 'scale(0)';
    el.style.opacity   = on ? '1'        : '0';
  });
  updateBloomLabel(show);
  refreshGroundPetals(show);
  refreshAnimals(false);
}

function visibleCount(pos) {
  const p = (pos === undefined) ? curPos : pos;
  return Math.min(BLOSSOM_COUNT, Math.round(p / totalCells * BLOSSOM_COUNT));
}

function updateBloomLabel(show) {
  document.getElementById('bloom-now').textContent = show;
  document.getElementById('bloom-rem').textContent = Math.max(0, BLOSSOM_COUNT - show) + 'クラスター';
}

/* 落ちた花びらは 60%以上で表示 */
function refreshGroundPetals(show) {
  const pct = show / BLOSSOM_COUNT;
  const gp = document.getElementById('ground-petals');
  if (gp) gp.style.opacity = pct >= 0.6 ? Math.min(1, (pct - 0.6) / 0.4 * 1.4).toFixed(2) : '0';
}

/* ============================================================
   動物の表示（20ptごと）
   ============================================================ */
function refreshAnimals(animate) {
  const target = Math.min(ANIMALS.length, Math.floor(curPos / 20));
  const g = document.getElementById('animals-group');
  if (!g) return;

  while (animalShownCount < target) {
    const { x, y, em } = ANIMALS[animalShownCount];

    // 位置グループ
    const outer = document.createElementNS(SVG_NS, 'g');
    outer.setAttribute('transform', `translate(${x},${y})`);

    // アニメ対象グループ
    const inner = document.createElementNS(SVG_NS, 'g');
    inner.style.transformOrigin = '0 0';
    inner.style.opacity = '0';
    inner.style.transform = 'scale(0)';

    // 影（楕円）
    const shadow = document.createElementNS(SVG_NS, 'ellipse');
    shadow.setAttribute('cx', '0'); shadow.setAttribute('cy', '4');
    shadow.setAttribute('rx', '10'); shadow.setAttribute('ry', '3.5');
    shadow.setAttribute('fill', 'rgba(0,0,0,0.10)');
    inner.appendChild(shadow);

    // 絵文字テキスト
    const txt = document.createElementNS(SVG_NS, 'text');
    txt.setAttribute('x', '0');
    txt.setAttribute('y', '0');
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('dominant-baseline', 'auto');
    txt.setAttribute('font-size', '20');
    txt.textContent = em;
    inner.appendChild(txt);

    outer.appendChild(inner);
    g.appendChild(outer);

    if (animate) {
      inner.animate([
        { transform:'scale(0) translateY(8px)', opacity:'0',   offset:0    },
        { transform:'scale(1.4) translateY(-5px)', opacity:'1', offset:0.55 },
        { transform:'scale(0.88) translateY(2px)', opacity:'1', offset:0.78 },
        { transform:'scale(1) translateY(0)',    opacity:'1',   offset:1    },
      ], { duration: 580, easing:'ease-out', fill:'forwards' });
    } else {
      inner.style.transform = 'scale(1)';
      inner.style.opacity   = '1';
    }

    animalShownCount++;
  }
}

/* ============================================================
   PIN 認証
   ============================================================ */
function authPin() {
  const v   = document.getElementById('pin-f').value;
  const msg = document.getElementById('pin-msg');
  if (v === TEACHER_PIN) {
    isAuth = true;
    document.getElementById('pin-row').style.display     = 'none';
    document.getElementById('pt-add-area').style.display = 'block';
  } else {
    msg.className   = 'pin-ng';
    msg.textContent = '暗証番号が違います';
    document.getElementById('pin-f').value = '';
    document.getElementById('pin-f').focus();
  }
}

/* ============================================================
   ポイント追加
   ============================================================ */
async function handleAdd() {
  if (isAnim || isGoal || !isAuth) return;
  const n = parseInt(document.getElementById('pt-val').value, 10);
  if (isNaN(n) || n < 1) return;

  const btn = document.getElementById('btn-add-pt');
  btn.disabled = true;
  isAnim = true;

  for (let i = 0; i < n; i++) {
    if (curPos >= totalCells) break;
    await animOneCluster();
    curPos++;
    savePos();
    renderStats();
    renderTreeFoot();
    refreshAnimals(true);

    if (curPos >= totalCells) {
      isGoal = true;
      await sleep(500);
      triggerGoal();
      break;
    }
    if (i < n - 1) await sleep(HOP_PAUSE);
  }

  isAnim = false;
  if (!isGoal) btn.disabled = false;

  // ポイント追加後に自動でGitHubへ反映
  autoPush();
}

async function autoPush() {
  const status = document.getElementById('push-status');
  if (!status) return;
  status.textContent = '⏳ 保存中...';
  status.style.color = '#f9a8d4';
  try {
    const d = _cachedData || {};
    const pin = d.adminPIN || '1210';
    const res = await fetch('/api/git-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const result = await res.json();
    status.textContent = result.ok ? '✅ 保存完了！生徒画面に反映されます' : '❌ ' + (result.error || '失敗');
    status.style.color = result.ok ? '#86efac' : '#fca5a5';
  } catch(e) {
    status.textContent = '❌ サーバーに接続できません';
    status.style.color = '#fca5a5';
  }
  setTimeout(() => { if (status) status.textContent = ''; }, 5000);
}

/* ============================================================
   1クラスター 開花アニメーション
   ============================================================ */
async function animOneCluster() {
  const prev = visibleCount(curPos);
  const next = visibleCount(curPos + 1);

  if (next > prev && prev < blossomEls.length) {
    const el = blossomEls[prev];

    await el.animate([
      { transform:'scale(0) rotate(-20deg)', opacity:'0',   offset:0    },
      { transform:'scale(1.4) rotate(6deg)', opacity:'1',   offset:0.50 },
      { transform:'scale(0.88) rotate(-3deg)', opacity:'1', offset:0.75 },
      { transform:'scale(1) rotate(0deg)',   opacity:'1',   offset:1    },
    ], { duration: HOP_MS, easing:'ease-out', fill:'forwards' }).finished;

    el.style.transform = 'scale(1)';
    el.style.opacity   = '1';

    const show = prev + 1;
    updateBloomLabel(show);
    refreshGroundPetals(show);

  } else {
    // 花が増えない場合は木を揺らす
    const svg = document.getElementById('tree-svg');
    svg.animate([
      { transform:'rotate(0deg) translateX(0px)'   },
      { transform:'rotate(-1.2deg) translateX(-2px)' },
      { transform:'rotate(1.2deg) translateX(2px)'  },
      { transform:'rotate(0deg) translateX(0px)'   },
    ], { duration:260, easing:'ease-in-out' });
    await sleep(200);
  }
}

/* ============================================================
   ゴール演出
   ============================================================ */
function triggerGoal() {
  // 落ち花びらを最大に
  const gp = document.getElementById('ground-petals');
  if (gp) gp.style.opacity = '1';

  spawnPetals();
  document.getElementById('goal-overlay').classList.add('show');
  const btn = document.getElementById('btn-add-pt');
  const inp = document.getElementById('pt-val');
  if (btn) btn.disabled = true;
  if (inp) inp.disabled = true;
}

function closeGoal() {
  document.getElementById('goal-overlay').classList.remove('show');
}

function spawnPetals() {
  const wrap   = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const shades = ['#ffb7c5','#ffdde5','#ff80ab','#f9a8d4','#fce7f3','#fbcfe8','#ff9dba'];
  for (let i = 0; i < 90; i++) {
    const el  = document.createElement('div');
    el.className = 'conf';
    const w   = 10 + Math.random() * 12;
    const rot = Math.random() * 360;
    const drift = (Math.random() - 0.5) * 160;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      width:${w}px; height:${w * .7}px;
      background:${shades[i % shades.length]};
      border-radius:50% 50% 50% 0;
      transform:rotate(${rot}deg);
      --cdrift:${drift}px;
      animation:cfall ${1.8 + Math.random()*2.6}s ${Math.random()*1.6}s linear forwards;
    `;
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 7000);
}

/* ============================================================
   ステータス
   ============================================================ */
function renderStats() {
  const rem = Math.max(0, totalCells - curPos);
  const pct = Math.min(100, Math.round(curPos / totalCells * 100));
  document.getElementById('stats').innerHTML = `
    <div class="stat">
      <div class="lbl">挙手回数</div>
      <div class="val">${curPos}</div>
      <div class="unt">/ ${totalCells} 回</div>
    </div>
    <div class="stat">
      <div class="lbl">あと</div>
      <div class="val">${rem}</div>
      <div class="unt">回で満開</div>
    </div>
    <div class="stat">
      <div class="lbl">達成率</div>
      <div class="val">${pct}</div>
      <div class="unt">%</div>
    </div>
  `;
}

function renderTreeFoot() {
  const rem = totalCells - curPos;
  const el  = document.getElementById('tree-foot');
  if (rem <= 0)       el.innerHTML = '🌸🌸 満開！雲外蒼天！ 🌸🌸';
  else if (!curPos)   el.innerHTML = '枯れ木に花を咲かせましょう 🌸';
  else                el.innerHTML = `あと <strong>${rem}</strong> 回の挙手で満開 🌸`;
}

/* ============================================================
   背景花びら
   ============================================================ */
function initBgPetals() {
  const wrap = document.getElementById('bg-petals');
  for (let i = 0; i < 18; i++) {
    const el   = document.createElement('div');
    el.className    = 'petal-bg';
    el.textContent  = '🌸';
    const dur  = 14 + Math.random() * 22;
    const drift = (Math.random() - 0.5) * 140;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      font-size:${0.5 + Math.random()*.8}rem;
      --drift:${drift}px;
      animation-duration:${dur}s;
      animation-delay:-${Math.random()*dur}s;
    `;
    wrap.appendChild(el);
  }
}

/* ============================================================
   ユーティリティ
   ============================================================ */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ============================================================
   初期化
   ============================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  ci = parseInt(new URLSearchParams(location.search).get('ci') || '0', 10);
  await loadData();

  document.title = campName + ' ― 桜の木';
  document.getElementById('hd-title').textContent = campName;

  buildBlossoms();
  refreshBlossoms();
  renderStats();
  renderTreeFoot();
  initBgPetals();

  if (isGoal) {
    const gp = document.getElementById('ground-petals');
    if (gp) gp.style.opacity = '1';
    document.getElementById('pt-panel').innerHTML =
      `<div style="text-align:center;padding:18px 14px;font-size:1.05rem;font-weight:800;color:#9d174d">
        🌸 満開達成済みです！おめでとう！ 🌸
      </div>`;
  }
});
</script>
