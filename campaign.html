<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャンペーン</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  min-height: 100vh;
  background: linear-gradient(to top,
    #6b8daa 0%, #7aaec6 14%, #8bbbd4 28%,
    #72b8d8 44%, #48abdc 60%, #1e96ea 76%,
    #1565c0 92%, #0d47a1 100%);
  color: #1e293b;
}

/* ===== 背景雲 ===== */
.bg-clouds { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
.bgc { position: absolute; background: rgba(255,255,255,0.14); border-radius: 70px; }
.bgc::before,.bgc::after { content:''; position:absolute; background:rgba(255,255,255,0.14); border-radius:50%; }
.bgc1{width:300px;height:92px;bottom:16%;left:-3%;animation:bdft 52s linear infinite;}
.bgc1::before{width:140px;height:140px;top:-70px;left:38px;}
.bgc1::after{width:105px;height:105px;top:-52px;left:144px;}
.bgc2{width:210px;height:64px;bottom:42%;right:-2%;animation:bdft 66s linear infinite reverse;}
.bgc2::before{width:96px;height:96px;top:-48px;left:26px;}
.bgc2::after{width:72px;height:72px;top:-36px;left:99px;}
.bgc3{width:170px;height:52px;top:18%;left:14%;animation:bdft 44s linear infinite;opacity:.2;}
.bgc3::before{width:78px;height:78px;top:-39px;left:20px;}
.bgc3::after{width:58px;height:58px;top:-29px;left:80px;}
@keyframes bdft{from{transform:translateX(-340px)}to{transform:translateX(110vw)}}

/* ===== ページ ===== */
.page { position:relative; z-index:1; max-width:560px; margin:0 auto; padding:0 16px 60px; }

/* ===== ヘッダー ===== */
.hd { padding:22px 0 16px; text-align:center; color:white; position:relative; }
.back-btn {
  position:absolute; top:26px; left:0;
  background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.36);
  color:rgba(255,255,255,.92); padding:6px 14px; border-radius:20px;
  font-size:.78rem; font-weight:700; text-decoration:none;
}
.back-btn:hover{background:rgba(255,255,255,.28);color:#fff;}
.hd-badge {
  display:inline-block; background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.3); padding:3px 16px;
  border-radius:16px; font-size:.76rem; letter-spacing:.1em; margin-bottom:10px;
}
.hd-title { font-size:clamp(1.4rem,5vw,2rem); font-weight:900; text-shadow:0 2px 10px rgba(0,0,0,.25); margin-bottom:5px; }
.hd-sub   { font-size:.8rem; opacity:.78; letter-spacing:.08em; }

/* ===== ステータスバー ===== */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
.stat {
  background:rgba(255,255,255,.9); backdrop-filter:blur(8px);
  border-radius:13px; padding:11px 8px; text-align:center;
  box-shadow:0 3px 14px rgba(0,0,0,.1); border:1px solid rgba(255,255,255,.6);
}
.stat .lbl { font-size:.65rem; color:#64748b; font-weight:700; margin-bottom:2px; }
.stat .val { font-size:1.45rem; font-weight:900; color:#1148a0; line-height:1; }
.stat .unt { font-size:.65rem; color:#94a3b8; }

/* ===== 雲ステージ外枠 ===== */
.stage-wrap {
  background:rgba(255,255,255,.1); backdrop-filter:blur(6px);
  border-radius:22px; padding:16px 16px 14px;
  border:1px solid rgba(255,255,255,.22);
  box-shadow:0 8px 32px rgba(0,0,0,.14);
  margin-bottom:18px;
}

/* ===== 雲ステージ（アニメーション本体） ===== */
.cloud-stage {
  position:relative;
  height:200px;
  overflow:hidden;
  border-radius:14px;
  background: linear-gradient(to top,
    rgba(80,130,180,.28) 0%, rgba(40,100,190,.1) 50%, transparent 100%);
}

/* 雲トラック（flex行、スライドアニメーション対象） */
.cloud-track {
  display:flex;
  position:absolute;
  bottom:28px;
  left:0;
  align-items:flex-end;
}

/* 雲セル（ふわっとした楕円） */
.cloud-cell {
  flex-shrink:0;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
}
/* 雲の本体 */
.cloud-body {
  width:100%;
  border-radius:40px;
  background:rgba(255,255,255,.93);
  box-shadow:0 6px 18px rgba(0,0,0,.13), 0 2px 6px rgba(0,0,0,.08);
  display:flex; align-items:center; justify-content:center;
  position:relative; z-index:1;
}
/* 雲のコブ（左・右） */
.cloud-bump {
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.93);
  z-index:0;
}
/* ゴール雲 */
.cloud-cell.is-goal .cloud-body { background:linear-gradient(135deg,#d1fae5,#6ee7b7); box-shadow:0 0 0 2px #10b981,0 6px 16px rgba(16,185,129,.3); }
.cloud-cell.is-goal .cloud-bump  { background:#d1fae5; }

/* 雲の番号ラベル */
.cld-num  { font-size:.78rem; font-weight:800; color:#475569; }
.cld-ico  { font-size:1.1rem; line-height:1; }
.cld-lbl  { font-size:.55rem; font-weight:700; color:#64748b; margin-top:1px; }

/* キャラクター */
#character {
  position:absolute;
  font-size:2rem;
  line-height:1;
  z-index:10;
}

/* ステージ下部テキスト */
.stage-foot {
  display:flex; justify-content:space-between;
  font-size:.8rem; font-weight:700; color:rgba(255,255,255,.82);
  margin-top:10px; padding:0 2px;
}
.stage-foot .now { font-size:1rem; color:#fff; }

/* ===== ポイント追加パネル ===== */
.pt-panel {
  background:rgba(255,255,255,.92); backdrop-filter:blur(8px);
  border-radius:18px; padding:20px 20px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  border:1px solid rgba(255,255,255,.6);
  margin-bottom:18px;
}
.pt-title { font-size:.9rem; font-weight:800; color:#1148a0; margin-bottom:14px; }
.pin-row  { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
.pin-f {
  padding:9px 13px; border:2px solid #bfdbfe; border-radius:10px;
  font-size:1rem; text-align:center; letter-spacing:.2em; width:130px;
  font-family:inherit; outline:none; transition:border-color .2s;
}
.pin-f:focus{border-color:#1148a0;}
.btn-auth {
  padding:9px 18px; background:linear-gradient(135deg,#1148a0,#38b2ac);
  color:#fff; border:none; border-radius:10px;
  font-size:.88rem; font-weight:700; cursor:pointer;
}
.btn-auth:hover{opacity:.9;}
.pin-ok { color:#16a34a; font-size:.82rem; font-weight:700; }
.pin-ng { color:#ef4444; font-size:.82rem; }
.pt-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.pt-input {
  padding:10px 13px; border:2px solid #bfdbfe; border-radius:10px;
  font-size:1.1rem; font-weight:700; text-align:center; width:90px;
  outline:none; font-family:inherit; color:#1148a0;
}
.pt-input:focus{border-color:#1148a0;}
.btn-add-pt {
  padding:10px 24px; background:linear-gradient(135deg,#1148a0,#38b2ac);
  color:#fff; border:none; border-radius:10px;
  font-size:.95rem; font-weight:800; cursor:pointer;
  box-shadow:0 3px 12px rgba(17,72,160,.3);
  transition:opacity .15s, transform .1s;
}
.btn-add-pt:hover:not(:disabled){opacity:.88; transform:translateY(-1px);}
.btn-add-pt:disabled{opacity:.4; cursor:not-allowed; box-shadow:none; transform:none;}
.pt-hint { font-size:.73rem; color:#94a3b8; margin-top:8px; }

/* ===== 全体進捗（すごろく） ===== */
.sec-title {
  font-size:.95rem; font-weight:800; color:rgba(255,255,255,.9);
  margin-bottom:12px; letter-spacing:.04em;
  text-shadow:0 1px 4px rgba(0,0,0,.2);
}
.snek-outer {
  background:rgba(255,255,255,.1); backdrop-filter:blur(4px);
  border-radius:20px; padding:16px;
  border:1px solid rgba(255,255,255,.2);
  box-shadow:0 6px 24px rgba(0,0,0,.1);
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.snek-label { text-align:center; font-size:.7rem; color:rgba(255,255,255,.62); letter-spacing:.1em; }
.snek-label.top{margin-bottom:10px;} .snek-label.bot{margin-top:10px;}

/* すごろくのマス */
:root{--sw:52px;--sh:42px;--sb:22px;--sg:7px;}
@media(max-width:380px){:root{--sw:42px;--sh:34px;--sb:18px;--sg:5px;}}
.snek-board{display:flex;flex-direction:column;gap:0;width:fit-content;margin:0 auto;}
.snek-row{display:flex;gap:var(--sg);align-items:flex-end;}
.sw{padding-top:calc(var(--sb)*.62);position:relative;flex-shrink:0;}
.sc{
  width:var(--sw);min-height:var(--sh);
  background:rgba(255,255,255,.88);
  border-radius:15px 15px 12px 12px;
  box-shadow:0 4px 10px rgba(0,0,0,.12);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;gap:1px;
}
.sc::before{
  content:'';position:absolute;
  width:var(--sb);height:var(--sb);
  background:rgba(255,255,255,.88);border-radius:50%;
  top:calc(var(--sb)*-.52);left:4px;
  box-shadow:calc(var(--sb)*.84) calc(var(--sb)*-.22) 0 calc(var(--sb)*.1) rgba(255,255,255,.88);
}
.sc-n{position:absolute;top:2px;left:4px;font-size:.48rem;color:#94a3b8;font-weight:800;}
.sc-i{font-size:.85rem;line-height:1;}
.sc-l{font-size:.5rem;font-weight:800;color:#475569;text-align:center;padding:0 2px;line-height:1.1;}
.sc.passed{background:rgba(147,197,253,.75);}
.sc.passed::before{background:rgba(147,197,253,.75);box-shadow:calc(var(--sb)*.84) calc(var(--sb)*-.22) 0 calc(var(--sb)*.1) rgba(147,197,253,.75);}
.sc.current{
  background:linear-gradient(145deg,#fff9c4,#ffe066);
  box-shadow:0 0 0 2.5px #f59e0b,0 6px 18px rgba(245,158,11,.5);
  animation:scpulse 2s ease-in-out infinite;
  transform:scale(1.1);z-index:4;
}
.sc.current::before{background:#fff9c4;box-shadow:calc(var(--sb)*.84) calc(var(--sb)*-.22) 0 calc(var(--sb)*.1) #fff9c4;}
@keyframes scpulse{
  0%,100%{box-shadow:0 0 0 2.5px #f59e0b,0 6px 18px rgba(245,158,11,.5);}
  50%{box-shadow:0 0 0 4.5px #fbbf24,0 10px 26px rgba(245,158,11,.7);}
}
.sc.goal{background:linear-gradient(135deg,#d1fae5,#6ee7b7);box-shadow:0 0 0 2px #10b981,0 5px 14px rgba(16,185,129,.3);}
.sc.goal::before{background:#d1fae5;box-shadow:calc(var(--sb)*.84) calc(var(--sb)*-.22) 0 calc(var(--sb)*.1) #d1fae5;}
.snek-conn{display:flex;height:22px;align-items:center;width:100%;}
.snek-conn.right{justify-content:flex-end;}
.snek-conn.left{justify-content:flex-start;}
.snek-arr{width:var(--sw);text-align:center;font-size:.92rem;color:rgba(255,255,255,.52);flex-shrink:0;}

/* ===== ゴール演出 ===== */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.conf{position:absolute;top:-14px;opacity:0;animation:cfall linear forwards;border-radius:2px;}
@keyframes cfall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:.2;transform:translateY(110vh) rotate(720deg)}}
#goal-overlay{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.62);backdrop-filter:blur(5px);
  align-items:center;justify-content:center;
}
#goal-overlay.show{display:flex;}
.goal-card{
  background:#fff;border-radius:24px;padding:40px 28px;
  text-align:center;max-width:320px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
  animation:gpop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes gpop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.goal-trophy{font-size:4rem;margin-bottom:14px;animation:gtrophy 1s ease-out .5s both;}
@keyframes gtrophy{from{transform:rotate(-20deg) scale(.8)}to{transform:rotate(0) scale(1)}}
.goal-ttl{font-size:1.9rem;font-weight:900;color:#1148a0;margin-bottom:8px;letter-spacing:.1em;}
.goal-msg{font-size:.93rem;color:#475569;line-height:1.75;}
.goal-cls{
  margin-top:20px;padding:12px 32px;
  background:linear-gradient(135deg,#1148a0,#38b2ac);
  color:#fff;border:none;border-radius:12px;
  font-size:1rem;font-weight:700;cursor:pointer;
}
footer{text-align:center;padding:22px 0 0;color:rgba(255,255,255,.6);font-size:.76rem;}
footer a{color:rgba(255,255,255,.76);text-decoration:none;font-weight:600;}
footer a:hover{color:#fff;}
</style>
</head>
<body>

<div class="bg-clouds">
  <div class="bgc bgc1"></div>
  <div class="bgc bgc2"></div>
  <div class="bgc bgc3"></div>
</div>

<!-- 紙吹雪 -->
<div class="confetti-wrap" id="confetti-wrap"></div>

<!-- ゴールオーバーレイ -->
<div id="goal-overlay">
  <div class="goal-card">
    <div class="goal-trophy" id="goal-trophy">🏆</div>
    <div class="goal-ttl">雲外蒼天！</div>
    <div class="goal-msg" id="goal-msg">おめでとう！<br>みんなで雲を越えて、快晴の空へ到達した！</div>
    <button class="goal-cls" onclick="closeGoal()">✨ とじる</button>
  </div>
</div>

<div class="page">

  <!-- ヘッダー -->
  <div class="hd">
    <a href="class_homepage.html" class="back-btn">← ホームへ</a>
    <div class="hd-badge">🎲 キャンペーンコーナー</div>
    <div class="hd-title" id="hd-title">キャンペーン</div>
    <div class="hd-sub">☁ 雲を渡って、雲外蒼天のゴールへ ☁</div>
  </div>

  <!-- ステータスバー -->
  <div class="stats" id="stats"></div>

  <!-- 雲ステージ -->
  <div class="stage-wrap">
    <div class="cloud-stage" id="cloud-stage">
      <div class="cloud-track" id="cloud-track"></div>
      <div id="character">🐦</div>
    </div>
    <div class="stage-foot">
      <span>☁ 現在：<span class="now" id="pos-now">0</span> マス目</span>
      <span id="rem-disp">ゴールまで — マス</span>
    </div>
  </div>

  <!-- ポイント追加パネル -->
  <div class="pt-panel" id="pt-panel">
    <div class="pt-title">🔑 ポイント追加（教員専用）</div>
    <div class="pin-row" id="pin-row">
      <input type="password" class="pin-f" id="pin-f" placeholder="暗証番号" maxlength="8"
             onkeydown="if(event.key==='Enter')authPin()">
      <button class="btn-auth" onclick="authPin()">認証する</button>
      <span id="pin-msg"></span>
    </div>
    <div id="pt-add-area" style="display:none">
      <div class="pt-row">
        <input type="number" class="pt-input" id="pt-val" min="1" max="20" value="1">
        <span style="font-size:.9rem;font-weight:700;color:#475569">pt</span>
        <button class="btn-add-pt" id="btn-add-pt" onclick="handleAdd()">追加する</button>
      </div>
      <div class="pt-hint">※ 1pt = 1マス進みます</div>
    </div>
  </div>

  <!-- 全体進捗すごろく -->
  <div class="sec-title">📊 全体の進捗</div>
  <div class="snek-outer">
    <div class="snek-label top">☀ 雲外蒼天 ― GOAL ☀</div>
    <div class="snek-board" id="snek-board"></div>
    <div class="snek-label bot">⛅ スタート地点</div>
  </div>

  <footer>
    <a href="class_homepage.html">← ホームページへ戻る</a>
  </footer>
</div>

<script>
/* ============================================================
   定数
   ============================================================ */
const STORAGE_KEY  = 'classHomepageData';
const TEACHER_PIN  = '1210';
const VISIBLE      = 5;   // 表示する雲の数
const HOP_MS       = 520; // 1ホップのアニメーション時間(ms)
const HOP_PAUSE    = 120; // ホップ間の間隔(ms)
const SPECIAL      = { 5:'⭐', 10:'🌤', 15:'☀️', 20:'🌈' };

/* ============================================================
   状態
   ============================================================ */
let ci         = 0;     // キャンペーンインデックス
let curPos     = 0;     // 現在位置（0〜total）
let totalCells = 24;
let goalEmoji  = '🏆';
let campName   = 'キャンペーン';
let isAuth     = false; // 教員認証済み
let isAnim     = false; // アニメーション中
let isGoal     = false; // ゴール済み

/* ============================================================
   データ（data.json から取得）
   ============================================================ */
let _cachedData = null;

async function loadData() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) return;
    const d = await res.json();
    _cachedData = d;
    if (d.campaigns && d.campaigns[ci]) {
      const c      = d.campaigns[ci];
      curPos       = c.current   ?? 0;
      totalCells   = c.total     ?? 24;
      goalEmoji    = c.goalEmoji || '🏆';
      campName     = c.name      || 'キャンペーン';
      isGoal       = c.completed || curPos >= totalCells;
    } else if (d.sugoroku) {
      curPos       = d.sugoroku.current       ?? 0;
      totalCells   = d.sugoroku.total         ?? 24;
      goalEmoji    = d.sugoroku.goalEmoji    || '🏆';
      campName     = d.sugoroku.campaignName || 'キャンペーン';
      isGoal       = curPos >= totalCells;
    }
  } catch(e) { console.error(e); }
}

async function savePos() {
  try {
    let d = _cachedData;
    if (!d) {
      const res = await fetch('data.json');
      d = res.ok ? await res.json() : {};
    }
    const completed = curPos >= totalCells;
    if (d.campaigns && d.campaigns[ci]) {
      d.campaigns[ci].current   = curPos;
      d.campaigns[ci].completed = completed;
    }
    _cachedData = d;
    const pin = d.adminPIN || '1210';
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin, data: d }),
    });
  } catch(e) { console.error(e); }
}

/* ============================================================
   PIN 認証
   ============================================================ */
function authPin() {
  const v   = document.getElementById('pin-f').value;
  const msg = document.getElementById('pin-msg');
  if (v === TEACHER_PIN) {
    isAuth = true;
    document.getElementById('pin-row').style.display     = 'none';
    document.getElementById('pt-add-area').style.display = 'block';
    msg.textContent = '';
  } else {
    msg.className   = 'pin-ng';
    msg.textContent = '暗証番号が違います';
    document.getElementById('pin-f').value = '';
    document.getElementById('pin-f').focus();
  }
}

/* ============================================================
   ポイント追加
   ============================================================ */
async function handleAdd() {
  if (isAnim || isGoal || !isAuth) return;
  const n = parseInt(document.getElementById('pt-val').value, 10);
  if (isNaN(n) || n < 1) return;

  const btn = document.getElementById('btn-add-pt');
  btn.disabled = true;
  isAnim = true;

  for (let i = 0; i < n; i++) {
    if (curPos >= totalCells) break;
    await animOneHop();
    curPos++;
    savePos();
    renderStats();
    renderStageFooter();
    renderSnake();

    if (curPos >= totalCells) {
      isGoal = true;
      await sleep(420);
      triggerGoal();
      break;
    }
    if (i < n - 1) await sleep(HOP_PAUSE);
  }

  isAnim = false;
  if (!isGoal) btn.disabled = false;
}

/* ============================================================
   雲ステージ レイアウト計算
   ============================================================ */
function layout() {
  const stage  = document.getElementById('cloud-stage');
  const stageW = stage.clientWidth || 340;
  const pad    = stageW < 320 ? 8 : 14;
  const gap    = stageW < 320 ? 6 : 10;
  const cloudW = Math.max(38, Math.floor((stageW - pad * 2 - gap * (VISIBLE - 1)) / VISIBLE));
  const cloudH = Math.max(40, Math.round(cloudW * 0.58));
  const bumpW  = Math.round(cloudW * 0.38);
  const slotW  = cloudW + gap;
  return { pad, gap, cloudW, cloudH, bumpW, slotW, stageW };
}

/* ============================================================
   雲ステージ 構築
   ============================================================ */
function buildStage() {
  const { pad, gap, cloudW, cloudH, bumpW } = layout();
  const track = document.getElementById('cloud-track');
  const char  = document.getElementById('character');

  track.innerHTML     = '';
  track.style.gap         = gap + 'px';
  track.style.paddingLeft = pad + 'px';

  // 現在位置から最大 VISIBLE 個の雲を生成
  visibleNums().forEach(n => track.appendChild(makeCloud(n, cloudW, cloudH, bumpW)));

  // キャラクター位置
  placeChar(pad, cloudW, cloudH, bumpW);
}

function visibleNums() {
  const arr = [];
  for (let n = curPos; n <= Math.min(curPos + VISIBLE - 1, totalCells); n++) arr.push(n);
  return arr;
}

function makeCloud(num, cloudW, cloudH, bumpW) {
  const outer = document.createElement('div');
  outer.className   = 'cloud-cell' + (num === totalCells ? ' is-goal' : '');
  outer.dataset.cn  = num;
  outer.style.width      = cloudW + 'px';
  outer.style.paddingTop = (bumpW * 0.55) + 'px';

  // コブ左
  const b1 = document.createElement('div');
  b1.className = 'cloud-bump';
  b1.style.cssText = `width:${bumpW}px;height:${bumpW}px;top:${Math.round(bumpW*0.04)}px;left:${Math.round(cloudW*0.1)}px;`;

  // コブ右（少し小さく）
  const b2  = document.createElement('div');
  const bw2 = Math.round(bumpW * 0.75);
  b2.className = 'cloud-bump';
  b2.style.cssText = `width:${bw2}px;height:${bw2}px;top:${Math.round(bumpW*0.22)}px;left:${Math.round(cloudW*0.52)}px;`;

  // 雲本体
  const body = document.createElement('div');
  body.className    = 'cloud-body';
  body.style.height = cloudH + 'px';

  const fs = Math.max(10, Math.round(cloudW * 0.18));
  if (num === totalCells) {
    body.innerHTML = `<div style="text-align:center;line-height:1.1"><div style="font-size:${Math.round(cloudW*.26)}px">${goalEmoji}</div><div class="cld-lbl">GOAL</div></div>`;
  } else if (num === 0) {
    body.innerHTML = `<div style="text-align:center;line-height:1.1"><div class="cld-ico">🚀</div><div class="cld-lbl">START</div></div>`;
  } else if (SPECIAL[num]) {
    body.innerHTML = `<div style="text-align:center;line-height:1.1"><div class="cld-ico">${SPECIAL[num]}</div><div class="cld-lbl" style="font-size:${Math.max(8,fs-2)}px">${num}</div></div>`;
  } else {
    body.innerHTML = `<span class="cld-num" style="font-size:${Math.max(11,fs)}px">${num}</span>`;
  }

  outer.appendChild(b1);
  outer.appendChild(b2);
  outer.appendChild(body);
  return outer;
}

function placeChar(pad, cloudW, cloudH, bumpW) {
  const char       = document.getElementById('character');
  const charX      = pad + cloudW / 2 - 14;
  const charBottom = 28 + cloudH + Math.round(bumpW * 0.55) + 6;
  char.style.left      = charX + 'px';
  char.style.bottom    = charBottom + 'px';
  char.style.transform = '';
}

/* ============================================================
   ホップアニメーション（1回分）
   Web Animations API + fill:'none' でフラッシュなし
   ============================================================ */
async function animOneHop() {
  const { cloudW, cloudH, bumpW, slotW } = layout();
  const track = document.getElementById('cloud-track');
  const char  = document.getElementById('character');

  // 次の雲を右端に追加（画面外からスライドイン）
  const nextN = curPos + VISIBLE;
  if (nextN <= totalCells) {
    track.appendChild(makeCloud(nextN, cloudW, cloudH, bumpW));
  }

  // キャラクター：放物線ホップ
  const charAnim = char.animate([
    { transform: 'translate(0px, 0px)',                offset: 0    },
    { transform: `translate(${slotW*.46}px, -56px)`,  offset: 0.40 },
    { transform: `translate(${slotW*.8}px, -18px)`,   offset: 0.78 },
    { transform: `translate(${slotW}px, 0px)`,        offset: 1    },
  ], { duration: HOP_MS, easing: 'ease-in-out', fill: 'none' });

  // トラック：左にスライド（同時）
  track.animate([
    { transform: 'translateX(0px)'         },
    { transform: `translateX(-${slotW}px)` },
  ], { duration: HOP_MS, easing: 'ease-in-out', fill: 'none' });

  await charAnim.finished;

  // 後処理：先頭の雲を削除（fill:'none' で既にリセット済み）
  if (track.firstElementChild) track.removeChild(track.firstElementChild);
  char.style.transform = '';
}

/* ============================================================
   ゴール演出
   ============================================================ */
function triggerGoal() {
  spawnConfetti();
  document.getElementById('goal-trophy').textContent = goalEmoji;
  document.getElementById('goal-overlay').classList.add('show');
  // ポイント追加パネルをロック
  const btn = document.getElementById('btn-add-pt');
  const inp = document.getElementById('pt-val');
  if (btn) btn.disabled = true;
  if (inp) inp.disabled = true;
}

function closeGoal() {
  document.getElementById('goal-overlay').classList.remove('show');
}

function spawnConfetti() {
  const wrap   = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#f59e0b','#3b82f6','#10b981','#ec4899','#8b5cf6','#ef4444','#06b6d4','#fbbf24'];
  for (let i = 0; i < 90; i++) {
    const el  = document.createElement('div');
    el.className = 'conf';
    const w   = 6 + Math.random() * 8;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      width:${w}px; height:${w}px;
      background:${colors[i % colors.length]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation:cfall ${1.4+Math.random()*2.2}s ${Math.random()*1.4}s linear forwards;
    `;
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 5000);
}

/* ============================================================
   ステータス・テキスト 更新
   ============================================================ */
function renderStats() {
  const rem = Math.max(0, totalCells - curPos);
  const pct = Math.min(100, Math.round(curPos / totalCells * 100));
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="lbl">現在地</div><div class="val">${curPos}</div><div class="unt">/ ${totalCells} マス</div></div>
    <div class="stat"><div class="lbl">ゴールまで</div><div class="val">${rem}</div><div class="unt">マス</div></div>
    <div class="stat"><div class="lbl">達成率</div><div class="val">${pct}</div><div class="unt">%</div></div>
  `;
}

function renderStageFooter() {
  document.getElementById('pos-now').textContent = curPos;
  const rem = totalCells - curPos;
  document.getElementById('rem-disp').textContent =
    rem > 0 ? `ゴールまで ${rem} マス` : '🎉 ゴール達成！';
}

/* ============================================================
   すごろく（スネーク盤面）
   ============================================================ */
function buildSnakeRows(tot) {
  const COLS = 5;
  const rows = [];
  let cell = 0, ri = 0;
  while (cell <= tot) {
    const r = [];
    for (let c = 0; c < COLS && cell <= tot; c++, cell++) r.push(cell);
    if (ri % 2 === 1) r.reverse();
    rows.push(r);
    ri++;
  }
  return rows.reverse(); // 上がゴール
}

function renderSnake() {
  const board = document.getElementById('snek-board');
  board.innerHTML = '';
  const rows = buildSnakeRows(totalCells);

  rows.forEach((rowCells, ri) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'snek-row';

    rowCells.forEach(n => {
      const wrap = document.createElement('div');
      wrap.className = 'sw';
      const cell = document.createElement('div');
      cell.className = 'sc';
      if      (n === curPos)     cell.classList.add('current');
      else if (n === totalCells) cell.classList.add('goal');
      else if (n < curPos)       cell.classList.add('passed');

      cell.innerHTML = `<span class="sc-n">${n}</span>`;
      if      (n === curPos)     cell.innerHTML += `<span class="sc-i">🐦</span>`;
      else if (n === totalCells) cell.innerHTML += `<span class="sc-i">${goalEmoji}</span><span class="sc-l" style="color:#065f46">GOAL</span>`;
      else if (n === 0)          cell.innerHTML += `<span class="sc-l">ST</span>`;
      else if (SPECIAL[n])       cell.innerHTML += `<span class="sc-i">${SPECIAL[n]}</span>`;

      wrap.appendChild(cell);
      rowEl.appendChild(wrap);
    });
    board.appendChild(rowEl);

    if (ri < rows.length - 1) {
      const origRow = rows.length - 1 - ri;
      const side    = origRow % 2 === 0 ? 'right' : 'left';
      const conn    = document.createElement('div');
      conn.className = `snek-conn ${side}`;
      const arr  = document.createElement('div');
      arr.className  = 'snek-arr';
      arr.textContent = '↑';
      conn.appendChild(arr);
      board.appendChild(conn);
    }
  });
}

/* ============================================================
   ユーティリティ
   ============================================================ */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ============================================================
   初期化
   ============================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  ci = parseInt(new URLSearchParams(location.search).get('ci') || '0', 10);
  await loadData();

  document.title = campName + ' ― キャンペーン';
  document.getElementById('hd-title').textContent = campName;

  renderStats();
  renderStageFooter();
  renderSnake();

  // 雲ステージはレイアウト確定後に構築
  requestAnimationFrame(() => {
    buildStage();

    // ゴール済みならパネルをロック
    if (isGoal) {
      document.getElementById('pt-panel').innerHTML =
        `<div style="text-align:center;padding:18px 14px;font-size:1.05rem;font-weight:800;color:#059669">
          🏆 このキャンペーンは達成済みです！おめでとう！
        </div>`;
    }
  });
});

// リサイズ時に雲ステージを再構築
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (!isAnim) buildStage(); }, 280);
});
</script>
